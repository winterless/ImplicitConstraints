# Usage:
# python -m src.implicit_constraints_demo.main --config llm_config_internal_gateway.yaml --output run_internal_gateway
#
# This config keeps the planning agent on a local OpenAI-compatible endpoint,
# while routing the world model and evaluator through the internal gateway hook.

agent:
  mode: llm
  provider: local_openai_compatible
  base_url: http://127.0.0.1:8000/v1
  model: /home/unlimitediw/workspace/models/Qwen3-4B-Instruct-2507
  model_agent: ""
  sub_account_name: ""
  api_key_env: ""
  api_key_file: ""
  require_api_key: false
  timeout_s: 120
  retries: 2
  temperature: 0.0
  max_tokens: 2048

world:
  mode: llm
  provider: internal_gateway
  base_url: ""
  model: gemini-3-pro-preview
  model_agent: xxx_world
  sub_account_name: xxx_sub
  api_key_env: ""
  api_key_file: ""
  require_api_key: false
  timeout_s: 120
  retries: 2
  temperature: 0.0
  max_tokens: 2048

evaluator:
  mode: llm
  provider: internal_gateway
  base_url: ""
  model: gemini-3-pro-preview
  model_agent: xxx_eval
  sub_account_name: xxx_sub
  api_key_env: ""
  api_key_file: ""
  require_api_key: false
  timeout_s: 120
  retries: 2
  temperature: 0.0
  max_tokens: 2048
