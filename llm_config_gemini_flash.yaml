# Usage:
# python -m src.implicit_constraints_demo.main --config llm_config_gemini_flash.yaml --output run_gemini_flash
#
# This config uses the native Google GenAI SDK path.
# Default model is set to `gemini-3.1-pro-preview`.

agent:
  mode: llm
  provider: gemini
  base_url: ""
  model: gemini-3.1-pro-preview
  api_key_env: GEMINI_API_KEY,GOOGLE_API_KEY
  api_key_file: .secrets/gemini_api_key.txt
  require_api_key: true
  timeout_s: 120
  retries: 2
  temperature: 0.0
  max_tokens: 2048

world:
  mode: llm
  provider: openai_compatible
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus
  api_key_env: DASHSCOPE_API_KEY,ALIYUN_API_KEY
  api_key_file: .secrets/alicloud_api_key.txt
  require_api_key: true
  timeout_s: 120
  retries: 2
  temperature: 0.0

evaluator:
  mode: llm
  provider: openai_compatible
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus
  api_key_env: DASHSCOPE_API_KEY,ALIYUN_API_KEY
  api_key_file: .secrets/alicloud_api_key.txt
  require_api_key: true
  timeout_s: 120
  retries: 2
  temperature: 0.0

