server: device
tool_name: timer.modify
description: 修改倒计时时长或标签。
input_schema:
  type: object
  properties:
    timer_id:
      type: string
    duration_seconds:
      type: integer
    label:
      type: string
  required:
  - timer_id
read_only: false
success_response_schema:
  type: object
  properties:
    updated:
      type: boolean
state_changes:
- timers[*]
failure_conditions:
- timer not found
