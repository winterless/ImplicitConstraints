server: device
tool_name: fitness.schedule_workout
description: 在日历或提醒中安排训练（HIIT、有氧等），可指定开始时间与强度。优先使用 workout_type 与 start_at，也兼容自然生成的别名参数 type、start_time、end_time、goal。
input_schema:
  type: object
  properties:
    workout_type:
      type: string
    type:
      type: string
    start_at:
      type: string
    start_time:
      type: string
    end_time:
      type: string
    intensity:
      type: string
    goal:
      type: string
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    event_id:
      type: string
state_changes:
  - calendar.events
failure_conditions:
  - conflict with sleep or health block
