server: device
tool_name: fitness.schedule_workout
description: 在日历或提醒中安排训练（HIIT、有氧等），可指定开始时间与强度。
input_schema:
  type: object
  properties:
    workout_type:
      type: string
    start_at:
      type: string
    intensity:
      type: string
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    event_id:
      type: string
state_changes:
  - calendar.events
failure_conditions:
  - conflict with sleep or health block
