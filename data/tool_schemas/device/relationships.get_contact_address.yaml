server: device
tool_name: relationships.get_contact_address
description: 按关系标签（如母亲、配偶）查询已保存的收件地址与联系人标识。
input_schema:
  type: object
  properties:
    relationship:
      type: string
  required:
    - relationship
read_only: true
success_response_schema:
  type: object
  properties:
    contact:
      type: object
state_changes: []
failure_conditions:
  - contact not found
