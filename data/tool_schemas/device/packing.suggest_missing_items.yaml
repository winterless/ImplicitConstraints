server: device
tool_name: packing.suggest_missing_items
description: 基于行程、天气和已装物品推断可能遗漏的行李。
input_schema:
  type: object
  properties:
    destination:
      type: string
    days:
      type: integer
    weather_summary:
      type: string
    packed_items:
      type: array
  required:
  - destination
  - packed_items
read_only: true
success_response_schema:
  type: object
  properties:
    missing_items:
      type: array
state_changes: []
failure_conditions:
- packing heuristic failed
