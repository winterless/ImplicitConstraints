server: device
tool_name: maps.start_navigation
description: Start navigation to a destination using a selected route.
input_schema:
  type: object
  properties:
    destination:
      type: string
    route_id:
      type: string
  required:
    - destination
    - route_id
read_only: false
success_response_schema:
  type: object
  properties:
    expected_arrival_time:
      type: string
state_changes:
  - navigation.active_destination
  - navigation.active_route_id
  - navigation.guidance_started
  - navigation.expected_arrival_time
failure_conditions:
  - route_id does not exist for the given destination
