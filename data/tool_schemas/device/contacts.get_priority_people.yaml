server: device
tool_name: contacts.get_priority_people
description: 按联系人标签、关系或身份提取高优先级联系人。
input_schema:
  type: object
  properties:
    labels:
      type: array
  required:
  - labels
read_only: true
success_response_schema:
  type: object
  properties:
    contacts:
      type: array
state_changes: []
failure_conditions:
- no contacts found for the requested labels
