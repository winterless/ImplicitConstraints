server: device
tool_name: reminder.create
description: 创建提醒事项。
input_schema:
  type: object
  properties:
    title:
      type: string
    remind_at:
      type: string
    note:
      type: string
  required:
  - title
read_only: false
success_response_schema:
  type: object
  properties:
    reminder_id:
      type: string
state_changes:
- reminders[*]
failure_conditions:
- invalid reminder time
