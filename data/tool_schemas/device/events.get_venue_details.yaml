server: device
tool_name: events.get_venue_details
description: 获取活动场馆地址和开始时间等信息。
input_schema:
  type: object
  properties:
    event_name:
      type: string
    city:
      type: string
  required:
  - event_name
read_only: true
success_response_schema:
  type: object
  properties:
    venue:
      type: object
state_changes: []
failure_conditions:
- venue details not found
