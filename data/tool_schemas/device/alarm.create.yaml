server: device
tool_name: alarm.create
description: 创建闹钟。
input_schema:
  type: object
  properties:
    time:
      type: string
    label:
      type: string
    enabled:
      type: boolean
  required:
  - time
read_only: false
success_response_schema:
  type: object
  properties:
    alarm_id:
      type: string
state_changes:
- alarms[*]
failure_conditions:
- duplicate alarm at the same time
