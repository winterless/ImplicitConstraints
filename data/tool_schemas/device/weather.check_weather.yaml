server: device
tool_name: weather.check_weather
description: 提供更口语化命名的天气查询接口。
input_schema:
  type: object
  properties:
    location:
      type: string
  required:
  - location
read_only: true
success_response_schema:
  type: object
  properties:
    weather:
      type: object
state_changes: []
failure_conditions:
- forecast not available
