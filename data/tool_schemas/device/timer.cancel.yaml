server: device
tool_name: timer.cancel
description: 取消指定倒计时。
input_schema:
  type: object
  properties:
    timer_id:
      type: string
  required:
  - timer_id
read_only: false
success_response_schema:
  type: object
  properties:
    cancelled:
      type: boolean
state_changes:
- timers[*]
failure_conditions:
- timer not found
