server: device
tool_name: vision.match_landmark
description: 对候选图片做地标或场景视觉匹配。
input_schema:
  type: object
  properties:
    photo_ids:
      type: array
    landmark_name:
      type: string
  required:
  - landmark_name
read_only: true
success_response_schema:
  type: object
  properties:
    matched_photo_ids:
      type: array
state_changes: []
failure_conditions:
- landmark visual signature not available
