server: device
tool_name: podcasts.play_episode
description: 播放指定播客节目。
input_schema:
  type: object
  properties:
    episode_id:
      type: string
  required:
  - episode_id
read_only: false
success_response_schema:
  type: object
  properties:
    playing:
      type: boolean
state_changes:
- playback.current_episode
failure_conditions:
- episode not found
