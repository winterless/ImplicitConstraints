server: device
tool_name: documents.parse_pdf
description: 解析 PDF 的正文、结构、表格和页码信息。
input_schema:
  type: object
  properties:
    document_id:
      type: string
  required:
  - document_id
read_only: true
success_response_schema:
  type: object
  properties:
    parsed_document:
      type: object
state_changes: []
failure_conditions:
- pdf parsing failed
