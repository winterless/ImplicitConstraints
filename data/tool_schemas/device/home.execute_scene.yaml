server: device
tool_name: home.execute_scene
description: 执行智能家居场景或一组设备动作。
input_schema:
  type: object
  properties:
    scene_name:
      type: string
    devices:
      type: array
    action:
      type: string
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    executed:
      type: boolean
state_changes:
- home.devices
failure_conditions:
- scene execution failed
