server: device
tool_name: commerce.list_recent_orders
description: 列出近期订单候选，便于在多个相似订单中定位目标对象。
input_schema:
  type: object
  properties:
    placed_within_days:
      type: integer
    keyword:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    orders:
      type: array
state_changes: []
failure_conditions:
- no recent orders matched the filters
