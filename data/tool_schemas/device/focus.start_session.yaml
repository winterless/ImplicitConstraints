server: device
tool_name: focus.start_session
description: 开启一个指定时长的专注会话。
input_schema:
  type: object
  properties:
    duration_minutes:
      type: integer
    title:
      type: string
  required:
  - duration_minutes
read_only: false
success_response_schema:
  type: object
  properties:
    session_id:
      type: string
    ends_at:
      type: string
state_changes:
- focus.active_session
failure_conditions:
- another focus session is already active
