server: device
tool_name: weather.get_forecast
description: 获取指定地点和时段的天气预报。
input_schema:
  type: object
  properties:
    location:
      type: string
    date:
      type: string
    time_range:
      type: string
  required:
  - location
read_only: true
success_response_schema:
  type: object
  properties:
    forecast:
      type: object
state_changes: []
failure_conditions:
- forecast not available
