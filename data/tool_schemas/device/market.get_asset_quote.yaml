server: device
tool_name: market.get_asset_quote
description: 查询指定资产在某交易场所的当前价格、短期趋势和关键技术区间。
input_schema:
  type: object
  properties:
    symbol:
      type: string
    venue:
      type: string
    include_recent_trend:
      type: boolean
  required:
  - symbol
read_only: true
success_response_schema:
  type: object
  properties:
    asset:
      type: object
state_changes: []
failure_conditions:
- market data unavailable
