server: device
tool_name: booking.list_upcoming_bookings
description: 列出用户近期的航班或旅行预订候选，便于在多个预订中定位目标对象。
input_schema:
  type: object
  properties:
    booking_type:
      type: string
    destination_hint:
      type: string
    date_hint:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    bookings:
      type: array
state_changes: []
failure_conditions:
- no upcoming booking matched the filters
