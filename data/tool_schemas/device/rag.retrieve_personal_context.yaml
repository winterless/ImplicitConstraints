server: device
tool_name: rag.retrieve_personal_context
description: 基于本地知识和用户标签检索与当前任务相关的上下文。
input_schema:
  type: object
  properties:
    query:
      type: string
    labels:
      type: array
  required:
  - query
read_only: true
success_response_schema:
  type: object
  properties:
    passages:
      type: array
state_changes: []
failure_conditions:
- no relevant local context found
