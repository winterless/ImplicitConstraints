server: device
tool_name: power.freeze_background_apps
description: 冻结高耗电后台应用或限制其后台活动。
input_schema:
  type: object
  properties:
    app_ids:
      type: array
    strategy:
      type: string
  required:
  - app_ids
read_only: false
success_response_schema:
  type: object
  properties:
    affected_apps:
      type: array
state_changes:
- power.restricted_apps
failure_conditions:
- one or more apps cannot be restricted
