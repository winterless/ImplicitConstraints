server: device
tool_name: notifications.set_delivery_policy
description: 配置通知投递策略，例如白名单放行、其余静音。
input_schema:
  type: object
  properties:
    whitelist_contact_ids:
      type: array
    allow_calls:
      type: boolean
    allow_messages:
      type: boolean
    mute_other_notifications:
      type: boolean
    duration_minutes:
      type: integer
  required:
  - mute_other_notifications
read_only: false
success_response_schema:
  type: object
  properties:
    policy_id:
      type: string
    applied:
      type: boolean
state_changes:
- notifications.delivery_policy
failure_conditions:
- notification access permission is missing
