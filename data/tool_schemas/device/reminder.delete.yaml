server: device
tool_name: reminder.delete
description: 删除提醒事项。
input_schema:
  type: object
  properties:
    reminder_id:
      type: string
  required:
  - reminder_id
read_only: false
success_response_schema:
  type: object
  properties:
    deleted:
      type: boolean
state_changes:
- reminders[*]
failure_conditions:
- reminder not found
