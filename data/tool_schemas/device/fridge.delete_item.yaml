server: device
tool_name: fridge.delete_item
description: 从冰箱库存记录中删除指定食材条目（如已处理或已丢弃的过期品）。
input_schema:
  type: object
  properties:
    item_ids:
      type: array
  required:
    - item_ids
read_only: false
success_response_schema:
  type: object
  properties:
    deleted:
      type: array
state_changes:
  - fridge.inventory
failure_conditions:
  - item not found
