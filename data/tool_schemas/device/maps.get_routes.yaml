server: device
tool_name: maps.get_routes
description: Get available route options for a destination.
input_schema:
  type: object
  properties:
    destination:
      type: string
  required:
    - destination
read_only: true
success_response_schema:
  type: object
  properties:
    destination:
      type: string
    routes:
      type: array
state_changes: []
failure_conditions:
  - destination not found in the current world state
