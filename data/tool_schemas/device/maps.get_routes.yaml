server: device
tool_name: maps.get_routes
description: >
  Get available route options for a destination. Optionally pass a reference departure_time
  (HH:MM) so ETA and expected_arrival reflect traffic for that leave-by moment; omit to use
  the scenario context local time.
input_schema:
  type: object
  properties:
    destination:
      type: string
    departure_time:
      type: string
  required:
    - destination
read_only: true
success_response_schema:
  type: object
  properties:
    destination:
      type: string
    departure_time:
      type: string
    routes:
      type: array
state_changes: []
failure_conditions:
  - destination not found in the current world state
