server: device
tool_name: iot.set_volume
description: 设置智能音箱、电视等设备的播放音量（0-100）。
input_schema:
  type: object
  properties:
    device_id:
      type: string
    volume_percent:
      type: integer
  required:
    - volume_percent
read_only: false
success_response_schema:
  type: object
  properties:
    volume_percent:
      type: integer
state_changes:
  - iot.devices
failure_conditions:
  - device offline
