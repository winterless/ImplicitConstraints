server: device
tool_name: iot.start_washer_cycle
description: 远程启动洗衣机/洗烘一体机，可指定模式、预约结束时间。
input_schema:
  type: object
  properties:
    device_id:
      type: string
    mode:
      type: string
    delay_minutes:
      type: integer
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    cycle_id:
      type: string
state_changes:
  - iot.devices
failure_conditions:
  - door open or invalid state
