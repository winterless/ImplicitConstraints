server: device
tool_name: power.apply_saving_plan
description: 应用省电方案，例如降亮度、关蜂窝、限制刷新率等。
input_schema:
  type: object
  properties:
    brightness_percent:
      type: integer
    disable_cellular:
      type: boolean
    disable_wifi:
      type: boolean
    low_power_mode:
      type: boolean
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    applied:
      type: boolean
state_changes:
- power.saving_plan
failure_conditions:
- requested saving plan conflicts with active emergency settings
