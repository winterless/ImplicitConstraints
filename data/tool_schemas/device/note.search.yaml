server: device
tool_name: note.search
description: 按标题或正文关键词搜索备忘录。
input_schema:
  type: object
  properties:
    query:
      type: string
  required:
  - query
read_only: true
success_response_schema:
  type: object
  properties:
    notes:
      type: array
state_changes: []
failure_conditions:
- note index unavailable
