server: device
tool_name: timer.create
description: 创建一个倒计时。
input_schema:
  type: object
  properties:
    duration_seconds:
      type: integer
    label:
      type: string
  required:
  - duration_seconds
read_only: false
success_response_schema:
  type: object
  properties:
    timer_id:
      type: string
    ends_at:
      type: string
state_changes:
- timers[*]
failure_conditions:
- duration is invalid
