server: device
tool_name: rail.search_train_options
description: >
  查询指定日期两站之间的候选列车，并返回出发到达时刻、票价等。
  中国高铁各车次均配置商务座等席别；是否可订取决于该车次对应席别的余座数量（如 business_seat_remaining，0 表示当趟该席别无票），而非「是否有商务座」。
input_schema:
  type: object
  properties:
    origin_station:
      type: string
    destination_station:
      type: string
    travel_date:
      type: string
    seat_class:
      type: string
  required:
  - origin_station
  - destination_station
  - travel_date
read_only: true
success_response_schema:
  type: object
  properties:
    trains:
      type: array
state_changes: []
failure_conditions:
- no train option matched the requested route
