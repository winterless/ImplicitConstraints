server: device
tool_name: rail.search_train_options
description: 查询指定日期两站之间的候选列车，并返回出发时间、席别余票与票价信息。
input_schema:
  type: object
  properties:
    origin_station:
      type: string
    destination_station:
      type: string
    travel_date:
      type: string
    seat_class:
      type: string
  required:
  - origin_station
  - destination_station
  - travel_date
read_only: true
success_response_schema:
  type: object
  properties:
    trains:
      type: array
state_changes: []
failure_conditions:
- no train option matched the requested route
