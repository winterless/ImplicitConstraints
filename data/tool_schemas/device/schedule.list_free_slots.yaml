server: device
tool_name: schedule.list_free_slots
description: 查询某个时间范围内的空闲日程窗口。
input_schema:
  type: object
  properties:
    start_time:
      type: string
    end_time:
      type: string
  required:
  - start_time
  - end_time
read_only: true
success_response_schema:
  type: object
  properties:
    slots:
      type: array
state_changes: []
failure_conditions:
- calendar source unavailable
