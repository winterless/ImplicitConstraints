server: device
tool_name: camera.set_alert_mode
description: 设置室内摄像头的活动侦测、宠物侦测或告警推送模式。
input_schema:
  type: object
  properties:
    camera_id:
      type: string
    mode:
      type: string
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    enabled:
      type: boolean
state_changes:
  - camera.alerts
failure_conditions:
  - camera offline
