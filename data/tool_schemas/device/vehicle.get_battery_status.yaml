server: device
tool_name: vehicle.get_battery_status
description: >
  查询当前绑定电动汽车的电量状态：剩余电量（SOC %）、表显/预估续航（公里）、
  充电接口类型与品牌等。长途导航、是否需中途补电等决策应优先基于本接口结果，
  而非依赖用户口述电量（用户可能未看仪表或口述不准）。
input_schema:
  type: object
  properties: {}
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    battery_percent:
      type: number
    estimated_range_km:
      type: number
    connector_type:
      type: string
    brand:
      type: string
state_changes: []
failure_conditions:
  - vehicle not paired
  - telemetry unavailable
