server: device
tool_name: reminder.modify
description: 修改提醒事项。
input_schema:
  type: object
  properties:
    reminder_id:
      type: string
    title:
      type: string
    remind_at:
      type: string
    note:
      type: string
  required:
  - reminder_id
read_only: false
success_response_schema:
  type: object
  properties:
    updated:
      type: boolean
state_changes:
- reminders[*]
failure_conditions:
- reminder not found
