server: device
tool_name: cooking.get_recipe
description: 获取指定菜品的步骤、时长和关键提醒。
input_schema:
  type: object
  properties:
    dish_name:
      type: string
  required:
  - dish_name
read_only: true
success_response_schema:
  type: object
  properties:
    recipe:
      type: object
state_changes: []
failure_conditions:
- recipe not found
