server: device
tool_name: media.open_on_tv
description: 在电视端打开指定影片或推荐页。
input_schema:
  type: object
  properties:
    media_id:
      type: string
  required:
  - media_id
read_only: false
success_response_schema:
  type: object
  properties:
    opened:
      type: boolean
state_changes:
- media.last_opened_device
failure_conditions:
- tv device unavailable
