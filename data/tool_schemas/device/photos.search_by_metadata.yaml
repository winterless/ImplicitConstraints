server: device
tool_name: photos.search_by_metadata
description: 按时间、地点、相册、关键词等元数据检索照片。
input_schema:
  type: object
  properties:
    start_date:
      type: string
    end_date:
      type: string
    location_query:
      type: string
    album:
      type: string
    keyword:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    photos:
      type: array
state_changes: []
failure_conditions:
- no photo matched the metadata filters
