server: device
tool_name: note.delete
description: 删除指定备忘录；高风险场景应要求上层先获得用户确认。
input_schema:
  type: object
  properties:
    note_ids:
      type: array
    confirmed:
      type: boolean
  required:
  - note_ids
  - confirmed
read_only: false
success_response_schema:
  type: object
  properties:
    deleted_count:
      type: integer
state_changes:
- notes[*]
- notes_trash[*]
failure_conditions:
- confirmation missing
- one or more notes cannot be deleted
