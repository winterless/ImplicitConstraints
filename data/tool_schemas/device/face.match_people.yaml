server: device
tool_name: face.match_people
description: 在端侧对候选照片做人脸匹配，筛出包含指定人物的结果。
input_schema:
  type: object
  properties:
    photo_ids:
      type: array
    people:
      type: array
    match_mode:
      type: string
  required:
  - people
read_only: true
success_response_schema:
  type: object
  properties:
    matched_photo_ids:
      type: array
state_changes: []
failure_conditions:
- face profile missing for one or more requested people
