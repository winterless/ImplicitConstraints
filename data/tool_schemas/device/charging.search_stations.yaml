server: device
tool_name: charging.search_stations
description: 沿路线或附近搜索充电站，可过滤接口类型、品牌快充兼容性、是否顺路。优先使用 along_route_id，也兼容常见别名 route_id。
input_schema:
  type: object
  properties:
    along_route_id:
      type: string
    route_id:
      type: string
    connector_types:
      type: array
    vehicle_brand:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    stations:
      type: array
state_changes: []
failure_conditions:
  - no stations found
