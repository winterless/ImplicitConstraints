server: device
tool_name: pet_feeder.set_schedule
description: 设置自动喂食器每日出食次数与时间点。
input_schema:
  type: object
  properties:
    feeder_id:
      type: string
    meals_per_day:
      type: integer
    times:
      type: array
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    schedule_id:
      type: string
state_changes:
  - pet_feeder.schedule
failure_conditions:
  - invalid schedule
