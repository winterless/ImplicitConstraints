server: device
tool_name: pet_feeder.set_schedule
description: 设置自动喂食器每日出食次数与时间点。优先使用 meals_per_day 与 times，也兼容常见别名参数 times_per_day 与 schedule。
input_schema:
  type: object
  properties:
    feeder_id:
      type: string
    meals_per_day:
      type: integer
    times_per_day:
      type: integer
    times:
      type: array
    schedule:
      type: array
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    schedule_id:
      type: string
state_changes:
  - pet_feeder.schedule
failure_conditions:
  - invalid schedule
