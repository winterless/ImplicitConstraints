server: device
tool_name: usage.get_app_activity
description: 获取应用的近期使用时长、打开次数和活跃度。
input_schema:
  type: object
  properties:
    app_ids:
      type: array
    days:
      type: integer
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    activities:
      type: array
state_changes: []
failure_conditions:
- usage statistics permission is missing
