server: device
tool_name: note.modify
description: 修改备忘录内容。
input_schema:
  type: object
  properties:
    note_id:
      type: string
    title:
      type: string
    content:
      type: string
  required:
  - note_id
read_only: false
success_response_schema:
  type: object
  properties:
    updated:
      type: boolean
state_changes:
- notes[*]
failure_conditions:
- note not found
