server: device
tool_name: poi.get_details
description: 查询兴趣点详情（露营地、充电站等）的设施、营业时间、是否含充电桩等。
input_schema:
  type: object
  properties:
    poi_id:
      type: string
    name_query:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    poi:
      type: object
state_changes: []
failure_conditions:
  - poi not found
