server: device
tool_name: time.convert_timezone
description: 在不同时区之间转换事件时间，并返回目标时区的本地时间与日期。
input_schema:
  type: object
  properties:
    source_time:
      type: string
    source_timezone:
      type: string
    target_timezone:
      type: string
    lead_minutes:
      type: integer
  required:
  - source_time
  - source_timezone
  - target_timezone
read_only: true
success_response_schema:
  type: object
  properties:
    converted:
      type: object
state_changes: []
failure_conditions:
- timezone conversion failed
