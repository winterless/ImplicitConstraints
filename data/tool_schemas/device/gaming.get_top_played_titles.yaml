server: device
tool_name: gaming.get_top_played_titles
description: 查询当前平台上最热门的游戏及其主要类型、活跃度和单局时长特征。
input_schema:
  type: object
  properties:
    platform:
      type: string
    region:
      type: string
  required:
  - platform
read_only: true
success_response_schema:
  type: object
  properties:
    games:
      type: array
state_changes: []
failure_conditions:
- popularity feed unavailable
