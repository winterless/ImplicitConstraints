server: device
tool_name: alarm.modify
description: 修改闹钟时间、标签或启用状态。
input_schema:
  type: object
  properties:
    alarm_id:
      type: string
    time:
      type: string
    label:
      type: string
    enabled:
      type: boolean
  required:
  - alarm_id
read_only: false
success_response_schema:
  type: object
  properties:
    updated:
      type: boolean
state_changes:
- alarms[*]
failure_conditions:
- alarm not found
