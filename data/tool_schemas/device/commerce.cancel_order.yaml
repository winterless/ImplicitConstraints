server: device
tool_name: commerce.cancel_order
description: 取消指定电商订单。
input_schema:
  type: object
  properties:
    order_id:
      type: string
    confirmed:
      type: boolean
  required:
  - order_id
  - confirmed
read_only: false
success_response_schema:
  type: object
  properties:
    cancelled:
      type: boolean
    order_id:
      type: string
state_changes:
- orders[*]
failure_conditions:
- order not found
- order is already processing
- confirmation missing
