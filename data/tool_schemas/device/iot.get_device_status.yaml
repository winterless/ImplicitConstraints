server: device
tool_name: iot.get_device_status
description: 查询智能家居设备状态（洗衣机门是否关、是否在运行、洗烘能力等）。
input_schema:
  type: object
  properties:
    device_id:
      type: string
    device_type:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    status:
      type: object
state_changes: []
failure_conditions:
  - device unavailable
