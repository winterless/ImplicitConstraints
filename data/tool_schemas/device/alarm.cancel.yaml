server: device
tool_name: alarm.cancel
description: 暂停或关闭指定闹钟。
input_schema:
  type: object
  properties:
    alarm_id:
      type: string
  required:
  - alarm_id
read_only: false
success_response_schema:
  type: object
  properties:
    cancelled:
      type: boolean
state_changes:
- alarms[*]
failure_conditions:
- alarm not found
