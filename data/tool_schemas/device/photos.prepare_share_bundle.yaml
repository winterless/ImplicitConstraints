server: device
tool_name: photos.prepare_share_bundle
description: 把候选照片打包成可分享集合。
input_schema:
  type: object
  properties:
    photo_ids:
      type: array
    bundle_name:
      type: string
  required:
  - photo_ids
read_only: false
success_response_schema:
  type: object
  properties:
    bundle_id:
      type: string
state_changes:
- photos.share_bundles[*]
failure_conditions:
- no photos selected
