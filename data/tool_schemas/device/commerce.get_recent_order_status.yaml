server: device
tool_name: commerce.get_recent_order_status
description: 查询最近订单的处理状态、取消窗口、支付进度和商品明细。
input_schema:
  type: object
  properties:
    keyword:
      type: string
    placed_within_days:
      type: integer
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    order:
      type: object
state_changes: []
failure_conditions:
- no matching recent order found
