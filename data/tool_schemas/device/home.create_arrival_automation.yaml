server: device
tool_name: home.create_arrival_automation
description: 创建基于到家 ETA 的智能家居自动化。
input_schema:
  type: object
  properties:
    eta_threshold_minutes:
      type: integer
    devices:
      type: array
    action:
      type: string
  required:
  - eta_threshold_minutes
  - devices
read_only: false
success_response_schema:
  type: object
  properties:
    automation_id:
      type: string
state_changes:
- home.automations[*]
failure_conditions:
- smart home permission missing
