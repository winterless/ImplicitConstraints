server: device
tool_name: messaging.open_contact_thread
description: 打开指定联系人的对话窗口或分享界面。
input_schema:
  type: object
  properties:
    contact_name:
      type: string
    intent:
      type: string
  required:
  - contact_name
read_only: false
success_response_schema:
  type: object
  properties:
    thread_id:
      type: string
    opened:
      type: boolean
state_changes:
- messaging.last_opened_thread
failure_conditions:
- contact not found
