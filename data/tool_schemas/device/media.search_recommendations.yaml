server: device
tool_name: media.search_recommendations
description: 根据情绪、类型和已看状态筛选影视推荐。
input_schema:
  type: object
  properties:
    mood:
      type: string
    excluded_tags:
      type: array
    unseen_only:
      type: boolean
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    recommendations:
      type: array
state_changes: []
failure_conditions:
- no recommendation matched the filters
