server: device
tool_name: payments.get_recent_transaction
description: 读取最近支付记录并按时间、金额或商户筛选。
input_schema:
  type: object
  properties:
    start_time:
      type: string
    end_time:
      type: string
    merchant_hint:
      type: string
  required: []
read_only: true
success_response_schema:
  type: object
  properties:
    transactions:
      type: array
state_changes: []
failure_conditions:
- payment data unavailable
