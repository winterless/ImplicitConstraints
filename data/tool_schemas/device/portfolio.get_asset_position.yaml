server: device
tool_name: portfolio.get_asset_position
description: 查询用户当前持仓、成本价、仓位规模和风险偏好等决策上下文。
input_schema:
  type: object
  properties:
    symbol:
      type: string
  required:
  - symbol
read_only: true
success_response_schema:
  type: object
  properties:
    position:
      type: object
state_changes: []
failure_conditions:
- asset position not found
