server: device
tool_name: payments.create_group_split
description: 按参与人生成群收款或 AA 请求。
input_schema:
  type: object
  properties:
    group_id:
      type: string
    total_amount:
      type: number
    participant_ids:
      type: array
    include_self:
      type: boolean
  required:
  - total_amount
  - participant_ids
read_only: false
success_response_schema:
  type: object
  properties:
    split_request_id:
      type: string
state_changes:
- payments.pending_split_requests[*]
failure_conditions:
- invalid participant set
