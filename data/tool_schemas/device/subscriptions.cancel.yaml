server: device
tool_name: subscriptions.cancel
description: 对指定订阅执行正式退订。
input_schema:
  type: object
  properties:
    subscription_id:
      type: string
    confirmed:
      type: boolean
  required:
  - subscription_id
  - confirmed
read_only: false
success_response_schema:
  type: object
  properties:
    cancelled:
      type: boolean
state_changes:
- subscriptions[*]
failure_conditions:
- confirmation missing
- provider requires external authorization
