server: device
tool_name: shopping.search_products
description: 在电商平台搜索商品，可返回价格、预计送达 ETA、评价摘要等。
input_schema:
  type: object
  properties:
    query:
      type: string
    max_delivery_date:
      type: string
    min_rating:
      type: number
  required:
    - query
read_only: true
success_response_schema:
  type: object
  properties:
    products:
      type: array
state_changes: []
failure_conditions:
  - no results
