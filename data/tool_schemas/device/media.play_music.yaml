server: device
tool_name: media.play_music
description: 在指定音箱或设备上播放音乐/白噪音，可设睡眠定时停止。优先使用 playlist_or_station，也兼容自然语言检索参数 query。
input_schema:
  type: object
  properties:
    source:
      type: string
    playlist_or_station:
      type: string
    query:
      type: string
    sleep_timer_minutes:
      type: integer
    device_id:
      type: string
  required: []
read_only: false
success_response_schema:
  type: object
  properties:
    playing:
      type: boolean
state_changes:
  - media.playback
failure_conditions:
  - device unavailable
