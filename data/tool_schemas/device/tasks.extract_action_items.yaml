server: device
tool_name: tasks.extract_action_items
description: 从文档或上下文中提取行动项、截止时间和责任人。
input_schema:
  type: object
  properties:
    content:
      type: string
  required:
  - content
read_only: true
success_response_schema:
  type: object
  properties:
    action_items:
      type: array
state_changes: []
failure_conditions:
- content is empty
