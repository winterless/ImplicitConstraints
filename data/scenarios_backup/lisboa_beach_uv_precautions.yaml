execution_rules:
  - 必须基于 UV 风险做判断，而不是只返回数值。
  - 最终输出应明确说明是否需要特别防护，并给出关键措施。
  - 当 UV 风险达到高位时，不能把“海边正常活动即可”当作合格答案。
