id: send_yesterday_ski_photos_to_lilei
category: implicit_reasoning
user_prompt: 帮我把昨天滑雪时拍到李雷的照片都整理出来并发给他。
original_question: 把昨天滑雪有李雷的照片都发给他。
tool_category: photo_people
implicit_reason: 用户不是要泛化分享照片，而是要按时间、场景和人物三重条件精准筛图后再发给指定联系人。系统应先锁定昨天的滑雪照片，再做人脸过滤，最后打包并拉起发送流程，减少误发或漏发。
hidden_constraints:
- 时间范围应限定为昨天。
- 场景可由相册、地点或视觉标签辅助识别为滑雪。
- 人脸匹配对象是李雷本人。
- 发送前应尽量只包含命中照片，避免混入无关内容。
suggested_plan:
- 筛选昨天的滑雪相关照片。
- 过滤出包含李雷的人像照片。
- 打包结果并打开与李雷的分享会话。
sample_result:
  tool_trace:
  - step: 1
    tool: device:photos.search_by_metadata
    arguments:
      start_date: "2026-03-18"
      end_date: "2026-03-18"
      keyword: 滑雪
      location_query: 雪场
    expected_observation: >
      返回昨日滑雪场景照片候选，后续仍需筛出含李雷人像的条目，避免把无关雪场风景一并打包。
  - step: 2
    tool: device:photos.search_by_metadata
    arguments:
      start_date: "2026-03-18"
      end_date: "2026-03-18"
      keyword: 李雷
    expected_observation: >
      在昨日时间范围内用姓名关键词收敛到含李雷出镜的人像照片 ID 列表，与滑雪场景取交集后可作为分享集合。
  - step: 3
    tool: device:photos.prepare_share_bundle
    arguments:
      photo_ids:
      - ski_lilei_0318_01
      - ski_lilei_0318_04
      bundle_name: 滑雪-李雷-20260318
    expected_observation: >
      生成可发送的分享包 bundle_id，仅包含上一步筛出的照片。
  - step: 4
    tool: device:messaging.open_contact_thread
    arguments:
      contact_name: 李雷
      intent: share_photos
    expected_observation: >
      打开与李雷的会话或分享入口，准备挂载分享包发送。
  final_answer: >
    我已把昨天（3 月 18 日）滑雪场景里拍到李雷的照片筛出来并打成分享包，只保留他出镜的条目。
    已为你打开与李雷的对话/分享界面，你确认后即可发送，避免混入其他风景或无关人物照片。
max_steps: 6
allowed_tools:
- device:photos.search_by_metadata
- device:photos.prepare_share_bundle
- device:messaging.open_contact_thread
- device:schedule.get_next_event
- device:schedule.list_free_slots
- device:note.search
- device:note.open
- device:reminder.create
- device:reminder.open
- device:weather.get_forecast
- device:weather.check_weather
- device:chat.get_group_context
- device:maps.search_nearby_places
- device:profile.get_user_labels
- device:timer.create
- device:alarm.create
