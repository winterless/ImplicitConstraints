execution_rules:
- 时间范围应限定为日历上的昨天（相对当前情景日期），不得扩展到其他日期。
- 场景可由相册、地点或视觉标签辅助识别为滑雪；筛图须先场景后人物或等价可复核的交集逻辑。
- 人脸或姓名过滤的对象必须是李雷本人，不得用同名替代。
- 发送前应尽量只包含命中照片；打包与打开会话前须能对应到具体 photo_id 或分享包，避免混入无关内容。
