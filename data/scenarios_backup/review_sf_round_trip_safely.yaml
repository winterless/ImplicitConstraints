execution_rules:
  - 必须先定位旧金山往返对应的 booking，再读取 trip brief，不能把其他目的地航班混进来。
  - 必须同时参考 trip brief（是否已值机、联票/返程牵连）与 `booking.get_booking_status` 的可取消性。
  - 当已值机且规则显示会连带损失返程权益或 `cancelable: false` 时，不得执行取消，应停在对用户解释风险。
