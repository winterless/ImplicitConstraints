id: review_sf_round_trip_safely
category: implicit_reasoning
user_prompt: 帮我看看现在取消这趟旧金山往返行程安不安全。
original_question: Hi, I need to cancel my round trip reservation to San Francisco, please.
tool_category: 往返行程取消判断
implicit_reason: 用户表面上是在请求取消一趟旧金山往返行程，但真实目标是先判断当前取消是否安全，尤其要检查这是不是一张已部分使用或已值机的往返票，避免直接取消带来更大损失。
hidden_constraints:
  - 必须先定位旧金山往返预订。
  - 必须结合 trip brief 判断是否为往返联票、是否已有一段使用或值机。
  - 如果当前不适合直接取消，应停在解释风险的节点，而不是贸然执行。
  - 只有在确认整单仍可安全取消时，才可执行取消。
suggested_plan:
  - 列出近期预订并定位旧金山往返行程。
  - 查询整段 trip brief 和当前票务状态。
  - 若存在部分使用或联票风险，则说明原因并停下。
sample_result:
  tool_trace:
    - step: 1
      tool: device:booking.list_upcoming_bookings
      arguments:
        booking_type: flight
      expected_observation: >
        列表中 `flt_901` 标注为往返行程且目的地旧金山，近期出发；另有 `flt_902` 为西雅图单程，不应混作同一趟“旧金山往返”。
    - step: 2
      tool: device:travel.get_trip_brief
      arguments: {}
      expected_observation: >
        Trip brief 显示 outbound 已值机（`outbound_checked_in: true`），且政策提示此时取消会连带作废返程积分/额度（`cancelling_now_voids_return_leg_credit`）。
    - step: 3
      tool: device:booking.get_booking_status
      arguments:
        booking_id: flt_901
      expected_observation: >
        预订状态为 checked_in 且 `cancelable: false`，与“现在直接取消很安全”相矛盾，应先解释风险并停止执行取消。
  final_answer: >
    这趟旧金山行程的 outbound 已经值机，系统侧显示不可直接取消，且规则提示现在取消会让返程权益受牵连。基于安全与损失控制，我不建议现在执行取消；
    若你仍要改行程，应先联系航司/查看改期或柜台方案，而不是在这里强行取消。
max_steps: 5
allowed_tools:
  - device:booking.list_upcoming_bookings
  - device:travel.get_trip_brief
  - device:booking.get_booking_status
  - device:booking.cancel_booking
  - device:reservations.get_details
  - device:reservations.cancel
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:weather.get_forecast
  - device:reminder.create
  - device:alarm.create
  - device:weather.check_weather
  - device:events.get_venue_details
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
