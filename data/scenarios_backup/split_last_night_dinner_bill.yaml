execution_rules:
- 总额必须来自可查到的支付/交易记录（或等效工具输出），不得仅凭用户口述手输作为唯一依据。
- 参与人数须尽量由群聊上下文、收款参与人列表等证据支撑，并在均摊规则下显式处理付款人是否计入。
- 人均金额须与总额、人数及是否包含付款人逻辑一致，并在发起收款前可复核。
- 最终应落到发起群收款或等效收款请求，并给出可跟踪的请求标识或明确状态，而不是只给出裸数字。
