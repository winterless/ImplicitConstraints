id: split_last_night_dinner_bill
category: implicit_reasoning
user_prompt: 帮我把昨晚的饭钱A一下。
original_question: 把昨晚聚餐的钱跟大家A一下。
tool_category: social_payments
implicit_reason: 用户不是单纯做除法，而是要从账单、参与人数和社交上下文里拼出一个可执行的收款动作。系统需要先确定昨晚实际支付金额，再识别参与人数或群聊对象，最后计算每人金额并发起群收款。
hidden_constraints:
- 总额应来自真实支付记录，而不是用户手输。
- 参与人数应尽量从群聊或合照等证据中确认。
- 需要处理付款人本人是否参与均摊的规则。
- 最终动作应是收款请求，而不是只有一个计算结果。
suggested_plan:
- 锁定昨晚聚餐支付记录和总额。
- 获取对应聚餐群或参与人列表。
- 计算人均金额并发起群收款。
sample_result:
  tool_trace:
  - step: 1
    tool: device:payments.get_recent_transaction
    arguments:
      start_time: "2026-03-18T00:00:00"
      end_time: "2026-03-19T00:00:00"
      merchant_hint: 火锅
    expected_observation: >
      查到昨晚聚餐实付总额与商户信息，金额作为均摊基数，不得用手输替代。
  - step: 2
    tool: device:chat.get_group_context
    arguments:
      group_name: 昨晚聚餐
      time_hint: "2026-03-18"
    expected_observation: >
      群成员共 5 人（含付款人本人），用于计算人均并确定收款对象集合。
  - step: 3
    tool: device:payments.create_group_split
    arguments:
      group_id: grp_dinner_0318
      total_amount: 480
      participant_ids:
      - u_self
      - u_alice
      - u_bob
      - u_carol
      - u_dave
      include_self: true
    expected_observation: >
      发起群收款请求，人均 96 元，对应 5 人均摊实付总额；返回 split_request_id 便于跟踪。
  final_answer: >
    昨晚聚餐实付 480 元，群里有 5 人一起 AA，人均 96 元。我已按该人数发起群收款请求，
    请你确认成员名单无误后再发出，避免少人或多摊。
max_steps: 6
allowed_tools:
- device:profile.get_user_labels
- device:note.search
- device:note.open
- device:reminder.create
- device:schedule.list_free_slots
- device:usage.get_app_activity
- device:documents.parse_pdf
- device:subscriptions.get_cancellation_options
- device:timer.create
- device:schedule.get_next_event
- device:documents.get_active_document
- device:billing.scan_subscription_charges
- device:subscriptions.cancel
- device:alarm.create
- device:payments.get_recent_transaction
- device:payments.create_group_split
- device:chat.get_group_context
