id: boss_pdf_action_items
category: implicit_reasoning
user_prompt: 帮我看下老板发的pdf需要我做啥。
original_question: 老板刚发的这个几十页的PDF，告诉我我需要干嘛就行。
tool_category: document_tasks
implicit_reason: 用户不是需要全文摘要，而是需要与自己职责相关的专属行动项提炼。系统需要先解析长文档，再结合用户角色、项目标签或本地知识做检索增强，最后输出可执行、可排序的事项清单，而不是泛泛的内容概述。
hidden_constraints:
- 文档可能很长，需先做结构化解析。
- 需要引入本地用户标签、岗位职责或项目上下文。
- 输出重点应是行动项、截止时间、负责人和依赖关系。
- 若信息不足，应显式标出不确定项。
suggested_plan:
- 先解析 PDF 的章节、表格与关键段落。
- 结合用户标签检索与本人职责相关的内容。
- 只输出行动项、时间点、依赖方和优先级。
sample_result:
  tool_trace:
  - step: 1
    tool: device:documents.get_active_document
    arguments: {}
    expected_observation: >
      当前活动文档应是老板刚发来的 PDF，能拿到文档 ID 与标题，
      作为后续解析的输入对象。
  - step: 2
    tool: device:documents.parse_pdf
    arguments:
      document_id: boss_pdf_0319
    expected_observation: >
      解析结果应提取出与发布计划、埋点补齐、灰度跟进相关的章节与段落，
      说明这不是泛泛摘要，而是可继续抽取行动项的结构化内容。
  - step: 3
    tool: device:profile.get_user_labels
    arguments: {}
    expected_observation: >
      用户标签显示其职责偏产品与增长项目协同，因此需要过滤掉仅属于法务、
      财务或其他团队的事项。
  - step: 4
    tool: device:tasks.extract_action_items
    arguments:
      content: 与会员增长改版及你本人职责相关的 PDF 内容
    expected_observation: >
      结构化输出里应只保留与你相关的行动项，包括截止时间、依赖方和未明确项。
  final_answer: >
    我只整理了和你本人相关的行动项：1）本周五前补齐会员改版埋点方案；2）下周二前和数据团队确认灰度指标口径；
    3）跟设计同学在评审前锁定权益页文案。依赖方分别是数据团队和设计团队。
    如果某项截止时间在 PDF 里没有写死，我会明确标注为待确认，而不会把全文都泛泛总结给你。
max_steps: 6
allowed_tools:
- device:reminder.check
- device:note.search
- device:note.open
- device:note.modify
- device:reminder.create
- device:reminder.modify
- device:schedule.list_free_slots
- device:schedule.get_next_event
- device:messaging.open_contact_thread
- device:timer.create
- device:documents.parse_pdf
- device:tasks.extract_action_items
- device:profile.get_user_labels
- device:documents.get_active_document
- device:alarm.create
