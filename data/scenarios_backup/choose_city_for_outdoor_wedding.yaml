id: choose_city_for_outdoor_wedding
category: implicit_reasoning
user_prompt: 基于今天的天气，推荐广州或深圳哪个更适合办户外婚礼。
original_question: 请帮我查询广州和深圳的当前气温，然后计算两地温差，最后根据天气状况推荐哪个城市更适合举办户外婚礼
tool_category: weather_event_decision
implicit_reason: 用户表面上是在比较两个城市的天气，但真实目标是为户外婚礼做城市选择。系统不能只返回温度，而要结合降雨、体感、风和湿度综合判断，并在必要时指出两地都不理想的情况。
hidden_constraints:
  - 不能只比较温度，必须综合降雨、风力、湿度和体感舒适度。
  - 需要输出明确推荐，而不是并列罗列两地天气。
  - 若两地都不适合户外婚礼，应说明风险并给出保守结论。
  - 温差只是辅助信息，不能替代整体可行性判断。
suggested_plan:
  - 查询广州和深圳今天的天气条件。
  - 比较影响户外婚礼的关键维度。
  - 输出推荐城市和关键原因，必要时给出不建议户外举办的提醒。
sample_result:
  tool_trace:
    - step: 1
      tool: device:weather.compare_cities
      arguments:
        cities:
          - Guangzhou
          - Shenzhen
      expected_observation: >
        广州为 light_rain，降雨概率高、湿度大；深圳为 cloudy，降雨概率明显更低、体感更舒适。
    - step: 2
      tool: device:temperature.check
      arguments:
        city: Shenzhen
      expected_observation: >
        深圳气温与体感相对适中，无极端高温或强风描述，更利于户外仪式与宾客停留。
  final_answer: >
    综合降雨、湿度和体感，**更推荐深圳**作为今天户外婚礼的城市：深圳以多云为主、降雨概率低得多，
    宾客淋雨与场地泥泞风险更小。广州虽有较高气温信号，但伴随明显降雨与高湿，户外仪式不确定性更大。
    若你必须在广州办，建议准备充足雨棚与备用室内环节；就「今天」而言深圳整体更稳。
max_steps: 4
allowed_tools:
  - device:weather.compare_cities
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:temperature.check
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:reminder.create
  - device:alarm.create
  - device:power.get_battery_status
  - device:events.get_venue_details
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
world:
  context:
    date: "2026-04-18"
    local_time: "10:20"
    city: Guangzhou
    scenario_source: query_top100_batch1
    source_query_id: seed_dataset_turn_e_part2.jsonl#79
  state:
    tool_responses:
      weather.compare_cities:
        cities:
          - city: Guangzhou
            condition: light_rain
            temperature_c: 29
            feels_like_c: 33
            rain_probability: 78
            humidity: 86
            wind_level: light
          - city: Shenzhen
            condition: cloudy
            temperature_c: 27
            feels_like_c: 29
            rain_probability: 18
            humidity: 68
            wind_level: gentle
      temperature.check:
        city: Shenzhen
        temperature_c: 27
        feels_like_c: 29
        comfort_outdoor: good
execution_rules:
  - 必须基于两地天气做比较，而不是只返回单城天气。
  - 最终输出必须给出推荐城市和关键原因，且至少引用一项非气温因素（如降雨概率、湿度或风况）支撑户外可行性判断。
  - 若某城市存在明显降雨风险，应降低其作为户外婚礼地点的优先级。
  - 温差只能作为辅助因素，不能替代整体天气适配性判断。
