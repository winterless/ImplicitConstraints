execution_rules:
  - 必须结合课堂/初中生场景筛选，而不是只按 perseverance 标签堆片单。
  - 默认优先 PG 与较高 classroom_fit；对 PG-13 应显式提示强度与审批风险。
  - 应利用观影历史避免重复推荐近期已放映作品。
  - 输出控制在少量候选，并说明主题契合与年龄/课堂适配理由。
