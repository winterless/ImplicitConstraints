id: finish_recipe_before_work_ends
category: implicit_reasoning
user_prompt: 下班前能做完《星火焰鸽汤》吗？
original_question: 我最近在厨房里抽到一份《星火焰鸽汤》的新食谱，想在下班前把它快速做好。先帮我把这道菜的所有食材、调味料、必备厨具以及详细的烹饪步骤整理成 Markdown 列表，然后告诉我现在几点了，这样我可以评估今晚下班前还能有多少时间去准备这些材料，能否赶得上。
tool_category: cooking_deadline_check
implicit_reason: 用户真正关心的是下班前是否来得及完成，而不是单独整理菜谱。系统需要先获取菜谱步骤与总耗时，再结合当前工作结束时间判断可行性，并在不可行时指出关键瓶颈。
hidden_constraints:
  - 需要把食材准备和烹饪总耗时一起计入。
  - 当前时间和下班时间共同决定可用窗口。
  - 最终输出应给出是否来得及的结论，而不是只返回菜谱。
  - 若来不及，应指出主要时间瓶颈。
suggested_plan:
  - 查询这道菜的总准备和烹饪时长。
  - 查询当前工作结束时间。
  - 比较剩余时间与总耗时，给出结论。
sample_result:
  tool_trace:
    - step: 1
      tool: device:cooking.get_recipe
      arguments:
        dish_name: 星火焰鸽汤
      expected_observation: >
        食谱显示准备约 25 分钟、烹制约 70 分钟，合计约 95 分钟，必须把全流程算进可行性。
    - step: 2
      tool: device:schedule.get_next_event
      arguments: {}
      expected_observation: >
        下一件日程为下班打卡 18:00，从当前时刻到下班之间可用时间不足以覆盖 95 分钟全流程。
  final_answer: >
    现在约 17:05，下班打卡在 18:00，满打满算只剩约 55 分钟可用窗口；
    而《星火焰鸽汤》准备加烹饪合计约 95 分钟，时间不够，今晚下班前做不完。
    主要瓶颈是烹饪段较长且无法被「只备料」替代——若仍想做，只能改天或改到不卡下班的时刻。
max_steps: 4
allowed_tools:
  - device:cooking.get_recipe
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:power.get_battery_status
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
  - device:reminder.create
  - device:timer.create
  - device:alarm.create
world:
  context:
    date: "2026-04-18"
    local_time: "17:05"
    city: Shanghai
    scenario_source: query_top100_batch1
    source_query_id: seed_dataset_turn_e_part3.jsonl#119
  state:
    calendar:
      next_event:
        title: 下班打卡
        start_time: "18:00"
        location: Office
        boarding_buffer_minutes: 0
    tool_responses:
      schedule.get_next_event:
        event:
          title: 下班打卡
          start_time: "18:00"
          location: Office
      cooking.get_recipe:
        recipe:
          dish_name: 星火焰鸽汤
          prep_minutes: 25
          cook_minutes: 70
          total_minutes: 95
          ingredients:
            - 乳鸽
            - 菌菇
            - 胡萝卜
execution_rules:
  - 必须把准备时间与烹饪时间一并计入总耗时，并与「当前时刻到下班打卡」之间的可用分钟数比较。
  - 不能只返回食谱或食材清单，不做是否来得及的结论。
  - 若总耗时超过下班前剩余时间，应明确说明来不及并点出主要时间瓶颈。
evaluation_rubric: []
