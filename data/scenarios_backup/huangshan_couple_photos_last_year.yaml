execution_rules:
- 地点判定应优先采用照片 GPS/地理标签；仅当缺失时再使用黄山视觉地标匹配作补全。
- 人脸比对必须同屏同时命中「我」与「老婆」，不能只满足其中一人。
- 「去年」在本场景中固定按 2025 自然年理解，与当前系统日期一致，不得漂移成模糊「最近一年」而不说明。
