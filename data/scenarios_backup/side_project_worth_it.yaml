id: side_project_worth_it
category: implicit_reasoning
user_prompt: 开始做一个副业项目值得吗？
original_question: I’m feeling stuck about whether to start a side‑project in my spare time. Could you give me some advice to help me decide if it’s worth pursuing?
tool_category: personal_tradeoff_judgment
implicit_reason: The user is not asking for generic encouragement, but for a real trade-off judgment about time, energy, and payoff. The system should inspect the user's current capacity and motivations, then decide whether starting now is worth it or whether a smaller or delayed approach is safer.
hidden_constraints:
  - The recommendation must weigh opportunity cost and burnout risk, not just upside.
  - The user's real goal and current capacity both matter for whether it is worth starting now.
  - The final response should give a clear recommendation with key reasons.
  - A tiny trial or defer decision may be better than an unconditional yes/no.
suggested_plan:
  - Read the user's side-project context.
  - Compare motivation and potential benefit against current workload and energy.
  - Return a recommendation with trade-off reasons.
sample_result:
  tool_trace:
  - step: 1
    tool: device:planning.get_side_project_context
    arguments: {}
    expected_observation: >
      动机包含技能成长与作品集信号，但当前工作负荷高、精力低、平均睡眠不足，
      且临近产品上线与家事，burnout 风险升高，不适合立刻全力开新项目。
  - step: 2
    tool: device:schedule.get_next_event
    arguments: {}
    expected_observation: >
      近期日历显示关键里程碑密集，与副业抢同一注意力池，进一步支持“先降载或推迟”而非立刻 all-in。
  final_answer: >
    综合动机与成本，现在立刻开这个副业并不划算：你已有明确收益动机，但当前工作负荷高、睡眠偏少、疲劳与倦怠风险偏高，
    且临近上线与家庭安排。更值得的做法是把范围缩到“每周固定几小时的试做里程碑”（例如只做最小原型与一页说明），
    或把正式启动放到上线与家事告一段落之后；不建议在现阶段承诺完整产品化节奏。
max_steps: 3
allowed_tools:
  - device:planning.get_side_project_context
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
