execution_rules:
  - 必须结合工具可读到的动机、可用时间、精力/睡眠与倦怠风险，与近期日程约束一起做判断，不得只谈理想收益。
  - 不能只给泛泛鼓励或否定，须说明主要取舍与可执行替代路径（缩小试做、推迟、分阶段等）。
  - 若上下文显示负担过重或风险升高，应优先给出“缩小范围试做”或“稍后开始”等合理折中，而非默认全力开干。
