id: cancel_one_of_multiple_flight_reservations
category: implicit_reasoning
user_prompt: 帮我取消其中一笔航班预订。
original_question: Hi, I'd like to cancel one of my flight reservations, please.
tool_category: 多航班冲突消解
implicit_reason: 题目核心在于“one of my reservations”带来的歧义消解。模型需要先枚举多个候选、找出最可能目标，再检查该单的取消条件，最后才执行。
hidden_constraints:
  - 用户近期有多张航班预订。
  - 只有其中一张与用户最近日程冲突，最可能是要取消的目标。
  - 不得在未做候选识别的情况下直接取消任意一张。
  - 在找到冲突项且规则允许后，应真正完成取消。
suggested_plan:
  - 列出近期航班预订。
  - 识别与近期日程冲突的一张。
  - 查看其取消规则并在允许时取消。
max_steps: 5
allowed_tools:
  - device:booking.list_upcoming_bookings
  - device:booking.get_booking_status
  - device:booking.cancel_booking
  - device:reservations.get_details
  - device:reservations.cancel
  - device:travel.get_trip_brief
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:weather.get_forecast
  - device:reminder.create
  - device:alarm.create
  - device:weather.check_weather
  - device:events.get_venue_details
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
