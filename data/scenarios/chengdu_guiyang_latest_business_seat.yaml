# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points（见 evaluator._build_evaluator_user_prompt）；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: chengdu_guiyang_latest_business_seat
category: implicit_reasoning
user_prompt: 查周六成都东到贵阳北最晚还有商务座余票的高铁。

implicit_reason: 用户表面上是在查车次信息，真实目标是筛出当天出发时刻尽量晚、且该车次商务座仍有余座的一趟。高铁均配置商务座席别，关键是对应车次当趟商务座是否还有余座；若无余座则需从仍有余座的车次中按出发时刻从晚到早筛选。须把日期、时刻、余座与票价绑定判断，不能把「更晚出发但商务座已售罄」的车次当作可订答案。

# 三条隐含考点（LLM 评测时应逐条给出 passed + reasoning）；车次号与时刻以轨迹与 final_world_state 为准，允许表述差异，但推理须自洽。
implicit_eval_points:
  - >
    【时间/截止/缓冲/时区/ETA】是否针对「周六」与指定 OD（成都东—贵阳北）调用 rail.search_train_options（或等价），且 travel_date 与用户所指周六一致；若日期含糊或查询范围错位，判弱不满足。
  - >
    【排序/筛选/最优选择】是否按车次区分「席别存在」与「当趟可售」：以 business_seat_remaining（或等价字段）为 0 表示该趟商务座无可售余座、大于 0 表示仍有余座。若把绝对出发最晚但 business_seat_remaining 为 0 的车次当作可订答案，判不满足；合理做法是在 business_seat_remaining>0 的子集中取出发时刻最晚的一趟（更晚车次无座则等价于向前择仍有余座者）。
  - >
    【排序/筛选/最优选择】在余票为真的子集中，是否选出出发时刻最晚的一趟，并给出该车次对应的商务座票价（与车次/席别一致）；若只罗列多趟、未收敛到唯一最优或未绑定票价，判弱不满足。

suggested_plan:
  - 按成都东—贵阳北、目标周六查询高铁候选车次。
  - 按 business_seat_remaining 排除当趟商务座无座车次，在仍有余座的班次中选出发最晚的一趟。
  - 输出车次、时刻及对应商务座票价。

sample_result:
  tool_trace:
    - step: 1
      tool: device:rail.search_train_options
      arguments:
        origin_station: 成都东
        destination_station: 贵阳北
        travel_date: "2026-04-18"
      expected_observation: >
        返回多趟车次：G2371 出发最晚但 business_seat_remaining 为 0；在仍有余座的班次中，
        G2981（18:05 发）比 G2893（17:32 发）更晚。
    - step: 2
      tool: device:schedule.get_next_event
      arguments: {}
      expected_observation: >
        当日无其它强制日程冲突出行时间的约束，选择最晚可订商务座车次作为答案合理。
  final_answer: >
    2026-04-18（周六）从成都东到贵阳北，在商务座仍有余座的车次里，最晚出发的是 G2981（18:05 开，20:41 到），
    商务座票价 728 元。更晚的 G2371 虽时刻更迟，但该趟商务座余座为 0，不能作为可订答案。

max_steps: 3
allowed_tools:
  - device:rail.search_train_options
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:weather.get_forecast
  - device:travel.get_trip_brief
  - device:alarm.create
  - device:reminder.create
  - device:time.convert_timezone
  - device:weather.check_weather
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create

