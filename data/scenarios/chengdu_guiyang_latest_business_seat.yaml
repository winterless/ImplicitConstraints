execution_rules:
  - 必须在有商务座余票的候选中选出最晚出发的一趟；比较出发时刻时不得把商务座已售罄的车次纳入候选集。
  - 不能把绝对最晚但已售罄商务座的车次当成正确答案。
  - 最终输出必须包含所选车次及其商务座票价，且票价须与该车次绑定。
