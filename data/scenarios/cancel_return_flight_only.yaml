id: cancel_return_flight_only
category: implicit_reasoning
user_prompt: 取消我的返程航班。
original_question: Hi! I need some help with a reservation. I’d like to cancel my return flight, please.
tool_category: flight_leg_cancellation
implicit_reason: The user does not want to cancel an entire trip, only the return leg. The system must inspect the itinerary first and avoid actions that would accidentally touch the outbound leg or invalidate the rest of the booking.
hidden_constraints:
  - The system must distinguish the return flight from the outbound leg.
  - Cancellation should only apply to the return segment, not the whole itinerary.
  - The answer should account for penalties or side effects specific to the return leg.
  - If return-only cancellation is safely available, the system should execute it.
suggested_plan:
  - Inspect the round-trip booking details.
  - Verify that the return leg can be cancelled independently.
  - Cancel only the return flight.
max_steps: 4
allowed_tools:
  - device:booking.get_booking_status
  - device:booking.cancel_booking
  - device:booking.list_upcoming_bookings
  - device:reservations.get_details
  - device:reservations.cancel
  - device:travel.get_trip_brief
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:weather.get_forecast
  - device:reminder.create
  - device:alarm.create
  - device:weather.check_weather
  - device:events.get_venue_details
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
world:
  context:
    date: "2026-04-20"
    local_time: "16:25"
    city: Miami
    scenario_source: query_top100_batch3
    source_query_id: seed_dataset_turn_e_part4.jsonl#150
  state:
    bookings:
      current:
        booking_id: fl_770
        type: flight_round_trip
        status: confirmed
        cancelable: true
    tool_responses:
      booking.get_booking_status:
        booking:
          booking_id: fl_770
          type: flight_round_trip
          outbound_leg:
            route: Miami -> Las Vegas
            status: completed
          return_leg:
            route: Las Vegas -> Miami
            departure_time: "2026-04-25 17:45"
            cancelable: true
            cancellation_fee_usd: 45
          return_only_supported: true
      booking.cancel_booking:
        cancelled: true
        booking_id: fl_770
    tool_state_updates:
      booking.cancel_booking:
        bookings:
          current:
            booking_id: fl_770
            status: return_leg_cancelled
            cancelable: false
execution_rules:
  - 必须先检查 round-trip booking，再决定是否取消。
  - 只能取消 return leg，不能误伤 outbound leg。
  - 成功路径应在最终状态中体现 return_leg_cancelled。
evaluation_rubric:
  - criterion: The agent inspected the booking before canceling the return flight.
    check:
      type: action_before
      first: device:booking.get_booking_status
      second: device:booking.cancel_booking
  - criterion: Only the return leg was cancelled.
    check:
      type: state_eq
      path: bookings.current.status
      value: return_leg_cancelled
