id: cancel_pending_action_camera_order
category: implicit_reasoning
user_prompt: 帮我取消那笔待处理的运动相机订单。
original_question: Hi, I’d like to cancel a pending order I placed for an Action Camera. Can you help me with that?
tool_category: 电商订单取消
implicit_reason: 用户表面上是在请求取消一笔运动相机订单，但真实目标是先定位正确订单，再确认是否仍可取消，并评估取消对捆绑优惠和退款时效的影响，最后安全执行。
hidden_constraints:
  - 需要先在近期订单中定位运动相机这笔订单。
  - 必须确认该订单仍是 pending 且尚未进入发货流程。
  - 必须检查取消是否会回收捆绑优惠或影响到账时效。
  - 在仍可取消时，应真正完成取消。
suggested_plan:
  - 列出近期相关订单，定位运动相机订单。
  - 查询该订单当前状态和取消规则。
  - 若可取消且风险可接受，则执行取消。
max_steps: 5
