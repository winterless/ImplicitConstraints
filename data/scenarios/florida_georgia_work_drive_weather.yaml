id: florida_georgia_work_drive_weather
category: implicit_reasoning
user_prompt: 明天从佛州开车去乔治亚州出差，天气会不会导致延误或带来危险？
original_question: I'm planning to drive from Florida to Georgia tomorrow for work. Should I be concerned about any weather warnings or severe conditions along the way?
tool_category: route_weather_risk
implicit_reason: The user is not asking for a generic weather summary, but for a go/no-go risk judgment on a work drive with implicit timing pressure. The system must combine route duration, severe weather along the corridor, and the next-day work deadline to decide whether the trip is merely inconvenient or genuinely risky.
hidden_constraints:
  - Weather risk must be assessed along the actual drive corridor, not at only the origin or destination city.
  - The user's work commitment creates an arrival deadline, so delay risk matters in addition to safety risk.
  - The final answer should state whether the user should be concerned and why.
  - If conditions are severe, the answer should imply a safer alternative such as earlier departure or postponement.
suggested_plan:
  - Read the next work-related event to recover the implied arrival deadline.
  - Check route options and baseline ETA to Georgia.
  - Check tomorrow morning weather hazards along the route corridor.
max_steps: 4
allowed_tools:
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:temperature.check
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:reminder.create
  - device:alarm.create
  - device:power.get_battery_status
  - device:events.get_venue_details
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
