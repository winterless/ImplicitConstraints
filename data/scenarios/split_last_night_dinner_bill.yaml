id: split_last_night_dinner_bill
category: implicit_reasoning
user_prompt: 帮我把昨晚聚餐的钱按人均分好，并发起群收款。
original_question: 把昨晚聚餐的钱跟大家A一下。
tool_category: social_payments
implicit_reason: 用户不是单纯做除法，而是要从账单、参与人数和社交上下文里拼出一个可执行的收款动作。系统需要先确定昨晚实际支付金额，再识别参与人数或群聊对象，最后计算每人金额并发起群收款。
hidden_constraints:
- 总额应来自真实支付记录，而不是用户手输。
- 参与人数应尽量从群聊或合照等证据中确认。
- 需要处理付款人本人是否参与均摊的规则。
- 最终动作应是收款请求，而不是只有一个计算结果。
suggested_plan:
- 锁定昨晚聚餐支付记录和总额。
- 获取对应聚餐群或参与人列表。
- 计算人均金额并发起群收款。
max_steps: 6
