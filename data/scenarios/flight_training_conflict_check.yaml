          recurrence: weekly_tuesday
          start_time: "20:00"
          end_time: "20:45"
          location: Home
execution_rules:
  - 必须把第二次体验换班后的具体日期与星期，和周二晚间固定自学块放在同一时间轴上比较，再下结论。
  - 不能只复述调班日期而不说明是否与周二 20:00-20:45 重叠。
  - 首次体验的时长和教员应作为补充信息返回，但不能替代主冲突判断。
evaluation_rubric: []
