id: cancel_tea_kettle_order_recent
category: implicit_reasoning
user_prompt: 取消我的茶壶订单。
original_question: Hi, I’d like to cancel my recent order for a Tea Kettle, please.
tool_category: 电商订单取消
implicit_reason: 用户表面上是要取消一个茶壶订单，但真实目标是安全地撤销最近的一笔消费，而不是误取消或在已进入处理阶段后硬执行。系统需要先核对最近订单状态与退款影响，再决定是否取消。
hidden_constraints:
  - 必须先确认最近订单中确实存在茶壶订单。
  - 必须确认该订单仍处于可取消状态。
  - 若取消会影响促销或退款到账节奏，应在最终说明里体现。
  - 若安全路径存在，应真正完成取消，而不是只解释规则。
suggested_plan:
  - 查询最近茶壶订单状态。
  - 核对是否仍可取消以及退款影响。
  - 在安全可行时执行取消。
