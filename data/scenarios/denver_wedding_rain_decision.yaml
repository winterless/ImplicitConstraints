id: denver_wedding_rain_decision
category: implicit_reasoning
user_prompt: 今天丹佛下午 2 点到 6 点会下雨吗？我的户外婚礼要看这个决定。
original_question: I need to know if it will rain between 2 PM and 6 PM in Denver, Colorado today so I can decide whether to cancel my outdoor wedding event.
tool_category: event_weather_decision
implicit_reason: The user is not merely asking for a forecast, but for a high-stakes weather decision affecting an outdoor wedding. The system must interpret the time-window forecast against event disruption risk and give a practical cancellation-or-backup recommendation rather than a bare forecast line.
hidden_constraints:
  - The forecast must be judged specifically for the 2-6 PM event window.
  - The answer should treat the wedding as a high-stakes, difficult-to-reverse event.
  - The final response should make the weather actionable for the cancellation decision.
  - A brief shower is different from sustained rain; forecast timing precision matters.
suggested_plan:
  - Check the Denver forecast for the wedding time window.
  - Assess whether rain risk is significant enough to threaten the event.
  - Return a clear recommendation tied to wedding impact.
sample_result:
  tool_trace:
    - step: 1
      tool: device:weather.get_forecast
      arguments:
        location: Denver
        date: "2026-04-20"
        time_range: "14:00-18:00"
      expected_observation: >
        预报显示婚礼窗口内为持续降雨，降雨概率高、预计降水量明显，
        且起止时间与户外仪式高度重叠，属于足以颠覆户外布置的风险。
    - step: 2
      tool: device:reminder.create
      arguments:
        title: 户外婚礼雨天备选方案确认
        remind_at: "2026-04-20 12:00"
        note: 与场地确认改室内或延期，并通知宾客
      expected_observation: >
        提醒已创建，便于在仪式前留出与场地和宾客沟通的缓冲时间。
  final_answer: >
    今天下午 2 点到 6 点丹佛户外婚礼窗口内大概率会下持续性的雨，而且强度足以让户外仪式难以按计划进行。
    建议你按“高风险雨天”处理：优先考虑改室内、搭建可靠雨棚或整体改期，而不是赌短时阵雨。
    我已帮你设一个中午前的提醒，方便你留出与场地和宾客同步调整的时间。
max_steps: 3
allowed_tools:
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:temperature.check
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:reminder.create
  - device:alarm.create
  - device:power.get_battery_status
  - device:events.get_venue_details
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
world:
  context:
    date: "2026-04-20"
    local_time: "09:30"
    city: Denver
    scenario_source: query_top100_batch3
    source_query_id: seed_dataset_turn_e_part2.jsonl#69
  state:
    tool_responses:
      weather.get_forecast:
        forecast:
          location: Denver outdoor venue district
          date: "2026-04-20"
          time_range: "14:00-18:00"
          condition: steady_rain
          rain_probability: 84
          expected_precip_mm: 6.2
          onset_time: "14:20"
          clearance_time: "18:30"
      reminder.create:
        reminder_id: wedding_rain_backup_chk
        created: true
execution_rules:
  - 必须把判断锚定在下午 2-6 点的婚礼窗口内，区分短时阵雨与持续降雨，不得用全天笼统概括替代。
  - 最终输出应能直接支撑是否改室内、延期或执行备选方案，而不是只复述预报数值。
  - 若窗口内为持续明显降雨，应给出偏谨慎、可执行的婚礼层面的结论。
evaluation_rubric: []
