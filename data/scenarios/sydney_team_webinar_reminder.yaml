# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: sydney_team_webinar_reminder
category: implicit_reasoning
user_prompt: 帮我定个美东早上11点的会议

implicit_reason: 用户当前**在上海出差**，设备本地为北京时间/上海时区，而会议锚点在**美国东部**；冬季北半球应使用**美东标准时间 EST（UTC-5）**，勿与夏令时 EDT 混淆。需要把「美东早上 11:00」正确换到用户所在地的本地钟面，并注意跨日影响。还须对照日程：若已有**北京时间**标注的会议与新时段重叠或紧邻，应先说明冲突并**请用户确认**是否仍创建提醒，而不是静默落钟或假装无冲突。

implicit_eval_points:
  - >
    【本地时区换算】是否结合用户当前在上海（Asia/Shanghai，与北京时间一致）把美东早上 11:00 正确换算为用户本地时间，并体现 1 月美东按冬令时处理、避免 DST 换算错误；若仍按纽约本地钟面直接理解、未完成换算，或把 EST/EDT 混淆到导致本地时间错误，判不满足。
  - >
    【跨日与日程冲突】是否意识到该会议落在用户本地的**次日零点**附近，并根据日程（如 schedule.get_next_event / list_free_slots 或等价）识别与**北京时间**已有会议的时间段重叠或紧邻冲突；若完全不看日程，或把跨日后的本地时刻当作当天处理，判不满足。
  - >
    【确认后再执行】在检测到冲突时是否向用户点明冲突并请求确认（改期、让出旧会或仍创建提醒等），而非在未确认时直接调用 reminder.create 或声称已订好；若静默创建提醒，判不满足。

suggested_plan:
  - 确认用户当前本地时区为上海，并按美东冬令时（EST）处理。
  - 将美东 11:00 换到 Asia/Shanghai，注意是否跨到次日。
  - 查阅该本地时段附近是否已有会议或紧邻冲突。
  - 若有冲突，先请用户确认后再创建提醒或调整方案。

sample_result:
  tool_trace:
    - step: 1
      tool: device:time.convert_timezone
      arguments:
        source_time: "2026-01-15 11:00"
        source_timezone: America/New_York
        target_timezone: Asia/Shanghai
      expected_observation: >
        1 月美东为 EST：11:00 对应上海/北京时间为次日 00:00（跨日），与「仅按 11 点加减」的错觉不同。
    - step: 2
      tool: device:schedule.get_next_event
      arguments: {}
      expected_observation: >
        日程中存在北京时间 2026-01-16 00:15 起的会议，与本次美东 11:00 所对应的本地 00:00 起时段重叠或紧挨，需要用户确认。
  final_answer: >
    你人在上海，美东 1 月按冬令时 EST 计，这场会对应你这边 1 月 16 日 00:00（北京时间）。
    日历里已有北京时间 1 月 16 日 00:15 的「客户汇报」，与这个时段明显冲突或过于紧邻；请先确认是改这场新会、调整旧会，还是仍要我按这个时间创建提醒，你确认前我不会擅自落提醒。

max_steps: 7
allowed_tools:
  - device:time.convert_timezone
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:power.get_battery_status
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
  - device:reminder.create
  - device:timer.create
  - device:alarm.create

