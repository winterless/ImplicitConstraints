id: packing_check_for_tomorrow_trip
category: implicit_reasoning
user_prompt: 帮我看看明天这趟出差还有什么没装，尤其提醒容易漏掉的东西。
original_question: （打开行李箱）看看我明天的出差还漏了什么？
tool_category: travel_packing
implicit_reason: 用户不是要一个固定行李清单，而是要结合目的地、出差天数、天气和当前箱内物品做动态缺失检测。系统应先获取行程信息和目的地天气，再识别箱内已有物品，最后提示高价值盲区，例如雨伞、充电器、证件或药品。
hidden_constraints:
- 需要先确定目的地、日期和停留时长。
- 需要结合当地天气判断额外物品。
- 箱内识别结果和推荐清单需要做差集比对。
- 优先提示“容易漏但影响大”的物品。
suggested_plan:
- 读取出差信息与目的地天气。
- 扫描箱内已有物品。
- 输出缺失物品和原因，优先高风险遗漏项。
max_steps: 6
allowed_tools:
- device:travel.get_trip_brief
- device:weather.get_forecast
- device:weather.check_weather
- device:temperature.check
- device:luggage.scan_items
- device:packing.suggest_missing_items
- device:schedule.get_next_event
- device:calendar.get_next_event
- device:maps.get_routes
- device:alarm.create
- device:alarm.check
- device:reminder.create
- device:reminder.check
- device:timer.create
- device:contacts.get_priority_people
- device:note.search
- device:note.open
- device:documents.parse_pdf
- device:photos.search_by_metadata
- device:power.get_battery_status
