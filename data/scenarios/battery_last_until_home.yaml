execution_rules:
- 需要估算当前到家的剩余路程或 ETA。
- 需要评估当前电量与预计耗电之间的差值。
- 若电量风险高，应自动执行分级省电策略。
- 省电策略应优先影响高耗电后台，而不是直接破坏关键通信能力。
