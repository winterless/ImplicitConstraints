id: battery_last_until_home
category: implicit_reasoning
user_prompt: 帮我判断现在的电量能不能撑到今晚回家，不够的话自动进入省电策略。
original_question: 保证我的手机电量能撑到我今晚回家。
tool_category: battery_commute
implicit_reason: 用户的真实目标不是查看电量，而是让剩余电量覆盖从当前时刻到回家的整段路程。系统需要估计回家所需时长，结合当前电量和耗电速率判断是否有缺口；如果风险较高，应冻结高耗电后台、降低亮度、限制联网等，而不是只给出一个被动提醒。
hidden_constraints:
- 需要估算当前到家的剩余路程或 ETA。
- 需要评估当前电量与预计耗电之间的差值。
- 若电量风险高，应自动执行分级省电策略。
- 省电策略应优先影响高耗电后台，而不是直接破坏关键通信能力。
suggested_plan:
- 先读取当前电量、预计续航和耗电画像。
- 估算回家 ETA，并判断是否存在续航缺口。
- 若不足，则冻结高耗电后台并应用省电方案。
max_steps: 6
allowed_tools:
- device:power.get_battery_status
- device:power.freeze_background_apps
- device:power.apply_saving_plan
- device:maps.get_routes
- device:maps.start_navigation
