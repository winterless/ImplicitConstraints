id: battery_last_until_home
category: implicit_reasoning
user_prompt: 帮我判断现在的电量能不能撑到今晚回家，不够的话自动进入省电策略。
original_question: 保证我的手机电量能撑到我今晚回家。
tool_category: battery_commute
implicit_reason: 用户的真实目标不是查看电量，而是让剩余电量覆盖从当前时刻到回家的整段路程。系统需要估计回家所需时长，结合当前电量和耗电速率判断是否有缺口；如果风险较高，应冻结高耗电后台、降低亮度、限制联网等，而不是只给出一个被动提醒。
hidden_constraints:
- 需要估算当前到家的剩余路程或 ETA。
- 需要评估当前电量与预计耗电之间的差值。
- 若电量风险高，应自动执行分级省电策略。
- 省电策略应优先影响高耗电后台，而不是直接破坏关键通信能力。
suggested_plan:
- 先读取当前电量、预计续航和耗电画像。
- 估算回家 ETA，并判断是否存在续航缺口。
- 若不足，则冻结高耗电后台并应用省电方案。
sample_result:
  tool_trace:
  - step: 1
    tool: device:power.get_battery_status
    arguments: {}
    expected_observation: >
      应读到当前电量偏低、预计续航只略高于十几分钟，
      且存在短视频、照片备份等高耗电后台应用。
  - step: 2
    tool: device:maps.get_routes
    arguments:
      destination: Home
    expected_observation: >
      回家最快路线 ETA 约为 22 分钟，比当前保守续航更紧张，
      说明存在在到家前掉电的风险。
  - step: 3
    tool: device:power.freeze_background_apps
    arguments:
      app_ids:
      - short_video
      - photo_backup
      strategy: aggressive_background_only
    expected_observation: >
      高耗电但非关键通信的后台应用被限制，
      优先削减不必要耗电而不影响基础联络能力。
  - step: 4
    tool: device:power.apply_saving_plan
    arguments:
      brightness_percent: 35
      disable_cellular: false
      disable_wifi: false
      low_power_mode: true
    expected_observation: >
      省电方案被应用，设备进入更保守的耗电模式，
      从而提高撑到回家的成功率。
  final_answer: >
    以你现在的电量，直接放着不管有可能撑不到回家，所以我会判定为“有风险”。
    我已经优先冻结了高耗电后台应用，并打开低电量省电策略；这样能尽量保住续航，
    同时不直接切断关键通信能力。
max_steps: 6
allowed_tools:
- device:power.get_battery_status
- device:power.freeze_background_apps
- device:power.apply_saving_plan
- device:maps.get_routes
- device:schedule.get_next_event
- device:schedule.list_free_slots
- device:weather.get_forecast
- device:weather.check_weather
- device:notifications.set_delivery_policy
- device:reminder.create
- device:alarm.create
- device:travel.get_trip_brief
- device:profile.get_user_labels
- device:note.search
- device:note.open
- device:focus.start_session
- device:timer.create
