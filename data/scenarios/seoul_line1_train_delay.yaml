id: seoul_line1_train_delay
category: implicit_reasoning
user_prompt: 从首尔站到仁川方向的 1 号线下一班列车还有多久到，是否晚点？
original_question: I'm waiting at Seoul Station on Line 1 for the next train to Incheon. How long should I expect to wait, and is there a delay in the current schedule?
tool_category: transit_wait_time
implicit_reason: The user is not asking for a static timetable lookup, but for a real-time wait and delay judgment. The system must combine live departure timing with schedule deviation and return a concrete expectation rather than generic transit information.
hidden_constraints:
  - The answer must use the next matching departure, not a static timetable summary.
  - Delay must be judged against the scheduled departure, not inferred loosely.
  - Wait time should be grounded in the user's current on-platform context.
  - The final response should give both expected wait and delay status.
suggested_plan:
  - Query the next matching Line 1 departure toward Incheon.
  - Compare live and scheduled departure times.
  - Return wait time and whether the train is delayed.
max_steps: 3
allowed_tools:
  - device:transit.get_next_departure
  - device:rail.search_train_options
  - device:time.convert_timezone
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:events.get_venue_details
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:temperature.check
  - device:power.get_battery_status
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:alarm.create
  - device:reminder.create
  - device:timer.create
world:
  context:
    date: "2026-04-18"
    local_time: "18:12"
    city: Seoul
    scenario_source: query_top100_batch1
    source_query_id: seed_dataset_turn_e_part4.jsonl#58
  state:
    tool_responses:
      transit.get_next_departure:
        departure:
          station: Seoul Station
          line: "Line 1"
          destination: Incheon
          scheduled_departure: "18:18"
          expected_departure: "18:24"
          wait_minutes: 12
          delayed: true
execution_rules:
  - 必须返回下一班匹配列车的等待时间。
  - 必须明确说明是否延误。
  - 不能把静态线路信息当成答案。
evaluation_rubric: []
