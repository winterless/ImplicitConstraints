id: chicago_picnic_weather_window
category: implicit_reasoning
user_prompt: 我下周一下午两点到五点想在芝加哥野餐，那段时间适合吗，还是要准备防雨？
original_question: I'm planning a picnic in Chicago next Monday afternoon. Will it be sunny between 2 PM and 5 PM, or should I prepare for rain during that window?
tool_category: 天气决策与备选安排
implicit_reason: 用户表面上是在问一个天气事实，但真实目标是判断芝加哥下周一下午 2 点到 5 点这段野餐窗口是否可用，以及如果天气不理想，是否应该改时间或至少提前做防雨准备。
hidden_constraints:
  - 必须使用精确到 2 点到 5 点的窗口天气，而不是全天摘要。
  - 不能只回答晴不晴，还要给出对野餐可行性的判断。
  - 如果原窗口风险较高，应考虑是否存在同日稍后的可替代时间。
  - 若决定采取应对措施，应该落到一个可执行动作上。
suggested_plan:
  - 查询该时间窗口的精确天气。
  - 查看同日是否还有更合适的空闲时段。
  - 若需要调整或备雨，创建一个可执行提醒。
max_steps: 5
allowed_tools:
  - device:weather.get_forecast
  - device:schedule.list_free_slots
  - device:reminder.create
  - device:weather.check_weather
  - device:temperature.check
  - device:schedule.get_next_event
  - device:travel.get_trip_brief
  - device:alarm.create
  - device:power.get_battery_status
  - device:events.get_venue_details
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
