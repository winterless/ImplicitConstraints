    date: "2026-04-24"
    local_time: "20:14"
    city: Portland
    scenario_source: query_top100_batch4
    source_query_id: seed_dataset_turn_e_part1.jsonl#54
  state:
    orders:
      current:
        order_id: ord_990
        status: processing
        cancelable: false
    tool_responses:
      commerce.list_recent_orders:
        orders:
          - order_id: ord_990
            item_name: standing desk mat
            placed_at: "2026-04-24 17:50"
            status: processing
      commerce.get_recent_order_status:
        order:
          order_id: ord_990
          item_name: standing desk mat
          placed_at: "2026-04-24 17:50"
