    tool_state_updates: {}
execution_rules:
  - 必须先检查订单状态与取消窗口。
  - 由于用户当前是在询问是否还能取消，未获进一步确认前不应直接执行取消。
  - 正确完成条件是说明当前已不可取消，并给出下一步替代路径。
