# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: comedy_movie_night_options
category: implicit_reasoning
user_prompt: 今天有什么建议去影院看的电影

implicit_reason: 用户要的是「今天去哪看、看什么」的可执行建议。需要先有**近期口碑/影评排行**作基准，并检索足够多**候选影院**做对比；但本题世界条件下**驾车约一小时内可达的影院只有一家**，其余门店均更远。口碑榜前列的多部影片中，常有**部分高排位影片在这家最近影院根本没有排片**，须向用户说清「近处能看什么 / 想看榜首需跑多远」。在「当前至深夜」场次约束下，答复应结合排行、路程与场次给出**可执行的选项**（例如少数几部强片 + 若坚持看榜首需去的远店与代价）；**不必**固定为「Top3」条数或固定排序格式。

implicit_eval_points:
  - >
    【排序/筛选/最优选择】是否引用近期影院侧或平台侧的口碑/评分排行（如 note.search、media.search_recommendations 或等价），作为排序基础；若完全无榜单依据、仅主观点名，判弱不满足。
  - >
    【排序/筛选/最优选择】是否结合 maps 类证据识别：**约一小时内可达的影院只有一家**，其余候选影院单程明显超过 60 分钟（或等价阈值），并据此区分「近」与「远」；若仍写成多家均在 1 小时内，判不满足。
  - >
    【跨对象依赖/整体损失或整体可行性】是否点明：口碑榜前列中**至少部分影片在这家最近影院无排片/不可购**，不能假装近处能看所有热榜片；若忽略缺片事实、仍把仅在远店上映的榜首当作近处首选，判弱不满足。
  - >
    【时间/截止/缓冲/时区/ETA】是否结合 context 当前时刻，说明从「现在」到当天深夜/末场在各店的可购场次差异（尤其近店 vs 远店）。

suggested_plan:
  - 查本周口碑/热映排行（条目宜足够多，便于对比缺片）。
  - 检索候选影院并核对各家 ETA，标出**唯一**一家 1 小时内可达店及其余远店。
  - 对照排片：哪些榜前列仅在远店、近店缺片。
  - 结合排行、路程与场次给出可执行方案（含「坚持看榜首」时的远店与代价）。

sample_result:
  tool_trace:
    - step: 1
      tool: device:note.search
      arguments:
        query: 影院 本周 口碑 排行 评分
      expected_observation: >
        获得较长榜单（如 Top6）：霓虹旧事、周末特攻、小城之春、午夜快递、深海灯、逆光行人等，作排序锚点。
    - step: 2
      tool: device:maps.search_nearby_places
      arguments:
        origin: 当前位置
        place_type: movie_theater
      expected_observation: >
        返回多家候选影院及 ETA；其中仅星光国际（静安）约 28 分钟在 1 小时内，其余均显著超过 60 分钟，形成「近单店 + 多远店」格局。
    - step: 3
      tool: device:maps.get_routes
      arguments:
        destination: 星光国际影城（静安店）
        departure_time: "19:25"
      expected_observation: >
        驾车约 28 分钟，确认属 1 小时内唯一合理选择；若查榜一片《霓虹旧事》需改目的地为 70 分钟以上的远店。
    - step: 4
      tool: device:note.open
      arguments:
        note_id: showtimes_bundle_0418
      expected_observation: >
        排片摘要显示：近店无《霓虹旧事》《午夜快递》排片；远店（如百丽宫、SFC）才有榜首或特定片。
  final_answer: >
    本周口碑 Top3 是《霓虹旧事》《周末特攻》《小城之春》。你驾车 1 小时内只有星光国际（静安）一家，这家店**今天没有《霓虹旧事》和《午夜快递》**，但有《周末特攻》《小城之春》《深海灯》等场次到深夜。
    **近处优先推荐**：①《周末特攻》21:00 ②《小城之春》22:10 ③《深海灯》23:20（按口碑与场次衔接排）。
    **若一定要看榜首《霓虹旧事》**：只能去约 72 分钟的兴业百丽宫等远店，并接受路程成本。

max_steps: 8
allowed_tools:
  - device:note.search
  - device:note.open
  - device:maps.search_nearby_places
  - device:maps.get_routes
  - device:maps.get_navigation_status
  - device:media.search_recommendations
  - device:media.get_watch_history
  - device:profile.get_user_labels
  - device:schedule.list_free_slots
  - device:schedule.get_next_event
  - device:reminder.create
  - device:timer.create
  - device:alarm.create

