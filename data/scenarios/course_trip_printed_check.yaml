execution_rules:
  - 必须同时覆盖课程、专注时段、出行时间和打印状态四类事实。
  - 不能把旅行信息漏掉，因为它是学习计划的截止锚点。
  - 打印状态必须基于检查结果，而不是猜测。
  - 最终输出应以核对结果为中心，而不是泛化建议。
