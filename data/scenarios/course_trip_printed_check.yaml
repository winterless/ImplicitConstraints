id: course_trip_printed_check
category: implicit_reasoning
user_prompt: 帮我核对专注时段、课程进度、冰岛出行时间，以及课程清单是否已打印贴在书桌前。
original_question: 我准备按工作日晚间20:00-22:00的固定专注时段继续推进《数据分析基础》直到2026年2月的冰岛出行前。请帮我核对：课程的平台与名称、我目前的完成进度、固定专注时段、以及出行的时间与目的地，并确认是否已经把课程清单打印贴在书桌前。
tool_category: study_trip_readiness
implicit_reason: 用户表面上是在做事实核对，真实目标是确认当前学习计划是否按预期推进。系统需要同时核对课程状态、固定学习节奏、旅行截止点和线下提醒物是否就位，而不是只返回其中一两项信息。
hidden_constraints:
  - 课程进度必须和固定专注节奏一起看，不能只报完成节数。
  - 出行时间是后续学习安排的截止锚点。
  - 打印并贴在书桌前属于实体状态，需要验证而不是假设。
  - 最终输出应覆盖全部核对项，不能遗漏任何一项。
suggested_plan:
  - 查询课程概览和固定学习安排。
  - 查询冰岛出行摘要。
  - 检查书桌前的课程清单状态。
  - 用事实项汇总核对结果。
sample_result:
  tool_trace:
    - step: 1
      tool: device:learning.get_course_overview
      arguments: {}
      expected_observation: >
        课程为 LearnLab 上《数据分析基础》，18/32 节完成；工作日 20:00–22:00 固定专注窗口。
    - step: 2
      tool: device:travel.get_trip_brief
      arguments: {}
      expected_observation: >
        冰岛行程 2026-02-15 出发、2026-02-24 返回，共 10 天，作为学习推进的截止锚点。
    - step: 3
      tool: device:workspace.inspect_item_status
      arguments:
        item_name: 课程清单
      expected_observation: >
        课程清单已打印并已放置在书桌前，实体提醒物就位。
  final_answer: >
    核对如下：《数据分析基础》在 **LearnLab**，进度 **18/32**；固定节奏为**工作日 20:00–22:00**。
    冰岛出行是 **2026-02-15 出发、2026-02-24 返回**（约 10 天），你在此之前按晚间专注块推进是前后一致的。
    「课程清单」**已打印并贴在书桌前**，实体核对项也成立。
max_steps: 5
allowed_tools:
  - device:travel.get_trip_brief
  - device:booking.list_upcoming_bookings
  - device:booking.get_booking_status
  - device:booking.cancel_booking
  - device:reservations.get_details
  - device:reservations.cancel
  - device:learning.get_course_overview
  - device:workspace.inspect_item_status
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:events.get_venue_details
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:power.get_battery_status
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:notifications.set_delivery_policy
  - device:focus.start_session
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
  - device:reminder.create
  - device:alarm.create
  - device:timer.create
