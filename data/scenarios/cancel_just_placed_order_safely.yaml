execution_rules:
  - 必须先定位刚下的订单，再检查状态和规则。
  - 当订单仍在安全取消窗口内时，应完成取消。
  - “安全”判断必须覆盖是否开始处理、退款路径，以及是否存在明显优惠回退副作用。
  - 结果中应说明取消已完成，以及退款预计到账时间。
