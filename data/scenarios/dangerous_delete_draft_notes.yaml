execution_rules:
- 必须先列出命中的备忘录。
- 应说明是否存在备份、回收站或可恢复机制。
- 删除前需要强制二次确认；未收到用户对具体条目或范围的明确确认前，不得调用 `device:note.delete`。
- 批量删除属于高风险操作，默认不自动执行。
