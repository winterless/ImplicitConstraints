id: arrive_home_turn_on_devices
category: implicit_reasoning
user_prompt: 快到家的时候帮我把家里的空调和热水器提前打开。
original_question: 等下快到家的时候，把家里的空调和热水器打开。
tool_category: smart_home
implicit_reason: 用户不是要立刻开设备，而是要基于到家 ETA 的条件触发自动化。系统需要持续感知回家路线或导航状态，在 ETA 进入阈值区间时静默执行智能家居动作，避免过早开启导致浪费。
hidden_constraints:
- 需要明确目标是“快到家”而非立即执行。
- 应基于 ETA 阈值触发，而不是固定时间触发。
- 需要同时控制多个设备。
- 自动化应在后台低打扰完成。
suggested_plan:
- 读取当前回家导航状态和 ETA。
- 创建接近到家时触发的自动化规则。
- 在 ETA 命中阈值时开启空调和热水器。
max_steps: 6
allowed_tools:
- device:timer.create
- device:timer.check
- device:reminder.create
- device:reminder.check
- device:power.get_battery_status
- device:weather.get_forecast
- device:schedule.get_next_event
- device:alarm.create
- device:alarm.check
- device:profile.get_user_labels
- device:note.search
- device:weather.check_weather
- device:schedule.list_free_slots
- device:travel.get_trip_brief
- device:note.open
- device:power.freeze_background_apps
- device:power.apply_saving_plan
