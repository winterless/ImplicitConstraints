id: cancel_just_placed_order_quickly
category: implicit_reasoning
user_prompt: 取消我刚下的订单。
original_question: Hi! I need to cancel an order I just placed. Can you help me with that?
tool_category: 电商订单取消
implicit_reason: 用户不是单纯想“按一下取消”，而是要赶在订单进入履约前安全撤回刚下单的购买。系统需要先核对订单是否还在短暂取消窗口内，再决定是否立刻执行。
hidden_constraints:
  - “刚下单”意味着存在真实的时间窗口压力。
  - 必须先确认订单尚未进入处理阶段。
  - 如果仍在窗口内，应尽快完成取消，而不是只给出泛化建议。
  - 若已过窗口，则应说明阻塞原因和替代路径。
suggested_plan:
  - 查询刚下单订单的当前状态。
  - 判断是否仍处于可取消窗口。
  - 若可取消则立即执行。
max_steps: 4
allowed_tools:
  - device:commerce.get_recent_order_status
  - device:commerce.cancel_order
  - device:commerce.list_recent_orders
  - device:commerce.get_order_policy
  - device:profile.get_user_labels
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:reminder.create
  - device:timer.create
  - device:note.search
  - device:notifications.set_delivery_policy
  - device:alarm.create
  - device:note.open
