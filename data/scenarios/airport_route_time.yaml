id: airport_route_time
category: implicit_reasoning
user_prompt: 帮我设置导航，确保我能准时到机场。
sample_result:
  tool_trace:
    - step: 1
      tool: device:schedule.get_next_event
      arguments: {}
      expected_observation: >
        读到下一条日程是 18:00 在 SEA Airport 起飞的航班，且需要 90 分钟登机缓冲，
        因而最晚应在 16:30 前到达机场。
    - step: 2
      tool: device:maps.get_routes
      arguments:
        destination: SEA Airport
      expected_observation: >
        看到 `route_short` ETA 为 42 分钟、`route_airport` ETA 为 34 分钟，
        虽然前者距离更短，但后者更快，更有机会满足 16:30 前到达的约束。
    - step: 3
      tool: device:maps.start_navigation
      arguments:
        destination: SEA Airport
        route_id: route_airport
      expected_observation: >
        导航应成功启动到 SEA Airport，预计到达时间不晚于 16:30，
        说明该路线满足航班起飞前的登机缓冲要求。
  final_answer: >
    已为你选择更稳妥的 Airport freeway route 并开始导航。虽然它距离更远，但 ETA 只有 34 分钟，
    比本地短路线更快，能在航班 18:00 起飞前预留 90 分钟登机缓冲，更适合这次去机场。
max_steps: 6
allowed_tools:
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:travel.get_trip_brief
  - device:maps.get_routes
  - device:maps.start_navigation
  - device:events.get_venue_details
  - device:weather.get_forecast
  - device:weather.check_weather
  - device:temperature.check
  - device:reminder.create
  - device:alarm.create
  - device:power.get_battery_status
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create
world:
  context:
    date: "2026-03-18"
    local_time: "15:50"
    city: "Seattle"
    destination_hint: "SEA Airport"
  state:
    calendar:
      next_event:
        title: "Flight to SFO"
        start_time: "18:00"
        location: "SEA Airport"
        boarding_buffer_minutes: 90
    maps:
      routes_by_destination:
        SEA Airport:
          - route_id: route_short
            label: Shorter local route
            distance_km: 32
            eta_minutes: 42
            traffic_level: heavy
            tolls: false
          - route_id: route_airport
            label: Airport freeway route
            distance_km: 39
            eta_minutes: 34
            traffic_level: moderate
            tolls: true
    navigation:
      active_destination: null
      active_route_id: null
      guidance_started: false
      expected_arrival_time: null
      selected_route_summary: null
execution_rules:
  - The task is successful only if expected arrival is at or before the flight start time minus the boarding buffer.
  - The shorter route is not necessarily the correct route because its ETA is worse.
  - Starting navigation should still succeed for either route; the evaluator decides whether it was actually good enough.
evaluation_rubric:
  - criterion: The agent checked the upcoming calendar event.
    check:
      type: action_called
      tool: device:schedule.get_next_event
  - criterion: The agent inspected route options before navigation.
    check:
      type: action_before
      first: device:maps.get_routes
      second: device:maps.start_navigation
  - criterion: The selected route satisfies the airport arrival buffer.
    check:
      type: arrival_before_event_buffer
      arrival_path: navigation.expected_arrival_time
      event_path: calendar.next_event.start_time
      buffer_path: calendar.next_event.boarding_buffer_minutes
  - criterion: Navigation is active to SEA Airport.
    check:
      type: state_eq
      path: navigation.active_destination
      value: SEA Airport
