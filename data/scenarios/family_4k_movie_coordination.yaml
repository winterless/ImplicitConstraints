execution_rules:
  - 新安排必须落在外孙离京之前。
  - 不能选在每周三既有固定观影安排上。
  - 若网络不适合 4K，则不能把观影安排当作已解决。
  - 成功路径应产出一个新的家庭观影提醒或等价安排。
