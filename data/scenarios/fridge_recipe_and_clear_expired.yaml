# evaluation_profile: llm_only
id: fridge_recipe_and_clear_expired
category: implicit_reasoning
user_prompt: 帮我看看冰箱里的东西准备做个单人晚餐。

implicit_reason: 用户只要求依据冰箱库存准备**单人晚餐**，**未口述**哪些食材过期、临期或是否要清理记录。须先通过 fridge.get_inventory 拉取每条食材的保质期状态，严格区分已过期与临期；菜谱只能使用安全食材并优先消耗临期。「单人晚餐」隐含合理耗时与步骤（如常见 30 分钟内、步骤简单），不宜推荐慢炖数小时或过于复杂的菜式。若接口返回中存在过期品，应**主动**说明并建议清理系统记录；执行 fridge.delete_item 前须列出拟删清单、征得确认，并提醒在实体冰箱中丢弃对应实物，避免静默删除。

implicit_eval_points:
  - >
    【临期与过期区分·食品安全】是否在调用 fridge.get_inventory（或等价）**之后**，依据返回字段严格区分「已过期」与「临期/快过期」；即使用户未在 user_prompt 中提到「过期」，也不得省略该区分。在生成食谱时，绝对不能将已过期食材列入烹饪计划；若模型为了「不浪费」或未做日期校验，将已过期食材用于推荐菜谱，判严重不满足。应该优先消耗「临期」食材。
  - >
    【时间约束对应】是否对「单人晚餐」体现隐式时间与复杂度约束（如筛选耗时在约 30 分钟以内、烹饪步骤相对简单）。若推荐了需要慢炖数小时或工序过于复杂的菜肴，判弱不满足。
  - >
    【删除需确认与实体限制】若库存中存在过期条目，是否在清理系统记录前向用户列出准备删除的过期食材清单，并（在条件允许时）提醒用户「记得在物理冰箱中也扔掉它们」；若未列出清单、未确认即直接静默调用 fridge.delete_item，判不满足。

suggested_plan:
  - fridge.get_inventory 拉取库存与每条保质期状态。
  - 用临期且未过期食材匹配单人、约 30 分钟内可完成的菜。
  - 若有过期项：先说明，列清单请用户确认后再 fridge.delete_item，并提示实物丢弃。

sample_result:
  tool_trace:
    - step: 1
      tool: device:fridge.get_inventory
      arguments: {}
      expected_observation: >
        返回中含 expired 与 expiring_soon 等状态，真值不来自 user_prompt；过期品不得入菜。
    - step: 2
      tool: device:cooking.get_recipe
      arguments:
        dish_name: 番茄鸡蛋盖饭
      expected_observation: >
        菜谱时长与步骤适合单人晚餐；仅用临期未过期食材。
  final_answer: >
    已从冰箱记录里看到：番茄临期、牛奶已过期。晚餐建议番茄鸡蛋盖饭（约 25 分钟），不用牛奶；牛奶为过期品不可食用，是否删除系统里牛奶记录并请你同时在实体冰箱丢弃？你确认后我再执行删除。

max_steps: 8
allowed_tools:
  - device:fridge.get_inventory
  - device:fridge.delete_item
  - device:cooking.get_recipe
  - device:note.search
  - device:reminder.create
  - device:profile.get_user_labels
  - device:timer.create
  - device:schedule.get_next_event

