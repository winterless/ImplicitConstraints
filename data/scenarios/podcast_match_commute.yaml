id: podcast_match_commute
category: implicit_reasoning
user_prompt: 帮我找一集时长刚好覆盖通勤时间的播客，并直接开始播放。
original_question: 给我播一集刚好能听到公司的播客。
tool_category: commute_audio
implicit_reason: 用户真实目标是让内容时长与通勤时长贴合，而不是随便播放播客。系统需要先估算当前通勤耗时，再筛选未听播客列表中时长匹配的节目，尽量减少中途没听完或提前播完的体验落差。
hidden_constraints:
- 需要精确估算当前到公司的通勤时间。
- 应优先选择未听过的播客。
- 匹配规则应允许一定时长容差，而不是只接受完全相等。
- 最终应直接开始播放，而不是只给推荐列表。
suggested_plan:
- 估算当前通勤路线和 ETA。
- 从未听列表中筛选时长最接近 ETA 的节目。
- 直接播放最佳匹配集。
max_steps: 6
allowed_tools:
- device:podcasts.list_unheard
- device:podcasts.play_episode
- device:media.get_watch_history
- device:media.search_recommendations
- device:schedule.get_next_event
- device:schedule.list_free_slots
- device:timer.create
- device:timer.check
- device:reminder.create
- device:profile.get_user_labels
- device:note.search
- device:media.open_on_tv
- device:chat.get_group_context
- device:note.open
- device:alarm.create
world:
  context:
    date: '2026-03-19'
    local_time: '18:10'
    city: Seattle
    destination_hint: Company HQ
    scenario_source: mobile_implicit_cases_zh
  state:
    calendar:
      next_event:
        title: Upcoming task
        start_time: '19:30'
        location: Company HQ
        boarding_buffer_minutes: 30
    maps:
