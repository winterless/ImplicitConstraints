# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: podcast_match_commute
category: implicit_reasoning
user_prompt: 帮我找集一集开车回家听的AI相关播客听。

implicit_reason: 用户要的是「话题相关 + 时长贴合回家通勤 + 不重复已听 + 在正确的播客客户端里落地」。系统应先明确用户常用的播客应用入口，再查询回家路线 ETA，在候选集中按主题（如 AI）筛选未听单集，并结合收听/完成历史排除已听过内容。未听列表里往往同时存在**明显过短**（几分钟快报类，路上会早早播完）、**明显过长**（深度/马拉松集，通勤内听不完）与**接近 ETA** 的单集，需在 AI 相关前提下优先选与回家 ETA 最匹配的一集，而非随手点最短或最长；最后直接播放或通过提醒/深链推送；不应凭默认分钟数猜通勤，也不应只给列表而不落地。

implicit_eval_points:
  - >
    【个性化/关系/偏好识别】是否先识别或约定用户侧播客客户端（如通过 profile.get_user_labels 或等价偏好/默认音频应用），并在该上下文中检索与播放；若完全未指定应用、混用不相关媒体入口，判弱不满足。
  - >
    【时间/截止/缓冲/时区/ETA】是否以「回家」目的地路线 ETA（maps.get_routes 或等价）为基准，将单集时长与 ETA 对齐并允许合理容差；若候选中同时存在明显过短（几分钟快报）与明显过长（数十分钟以上深度/马拉松）的 AI 相关单集，是否优先选择与 ETA 最接近、一路可听完的主选，而非误选「最短」或「最长」集；若仍用与公司/其他无关目的地或臆测通勤分钟数，判不满足。
  - >
    【个性化/关系/偏好识别】是否在候选集中按用户主题（如 AI）筛选或收窄列表（podcasts.list_unheard 带 show/筛选或等价），并参考 media.get_watch_history 或等价收听记录，避免重复推荐已听完或近期已覆盖的同一内容；若完全忽略历史或话题，判弱不满足。
  - >
    【自动化/提醒/真正落地执行】是否在匹配后调用 podcasts.play_episode 开始播放，或通过 reminder.create 等含深链/可点击说明的推送让用户一键打开；若仅罗列候选而无播放或等价落地动作，判不满足。

suggested_plan:
  - 读取用户偏好的播客应用或默认播客入口。
  - 查询当前回家路线 ETA。
  - 拉取近期媒体/播客收听历史用于排除。
  - 在未听列表中按 AI 等主题筛选，选时长最接近 ETA 的单集。
  - 直接播放或创建提醒推送深链。

sample_result:
  tool_trace:
    - step: 1
      tool: device:profile.get_user_labels
      arguments: {}
      expected_observation: >
        用户标签表明默认播客客户端为 Apple Podcasts（或等价），后续检索与播放应落在该应用侧。
    - step: 2
      tool: device:maps.get_routes
      arguments:
        destination: Home
      expected_observation: >
        回家最快路线 ETA 约 22 分钟，作为单集时长匹配基准，并允许几分钟容差。
    - step: 3
      tool: device:media.get_watch_history
      arguments:
        days: 30
      expected_observation: >
        近期已完成播客单集 ep_ai_401（AI Daily），选新单集时应排除同一集或已标记完成项。
    - step: 4
      tool: device:podcasts.list_unheard
      arguments:
        show_name: AI Daily
      expected_observation: >
        未听列表中同时含多档 AI 相关单集作干扰：如 4～8 分钟快报类明显过短、35～95 分钟类明显相对 ETA 过长；
        ep_ai_402 约 23 分钟与 22 分钟 ETA 最接近，应避免只选「最短」或误选超长深度集。
    - step: 5
      tool: device:podcasts.play_episode
      arguments:
        episode_id: ep_ai_402
      expected_observation: >
        已在偏好播客客户端开始播放匹配单集；若用户选择推送而非立即播放，可改为 reminder.create 带打开该集的说明。
  final_answer: >
    你已用 Apple Podcasts，回家最快路线约 22 分钟。我查了近期收听记录，避免再推已听完的 AI Daily #401；
    未听库里有几分钟快报、也有五十多分钟以上的深度集，都不适合当「一路听到家」的主选；我选了一集约 23 分钟的 AI 相关节目并已开始播放，与 22 分钟 ETA 最贴合。若你更希望只收到通知，我可以改成推送深链。

max_steps: 8
allowed_tools:
  - device:maps.get_routes
  - device:podcasts.list_unheard
  - device:podcasts.play_episode
  - device:media.get_watch_history
  - device:profile.get_user_labels
  - device:reminder.create
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:timer.create
  - device:timer.check
  - device:note.search
  - device:note.open
  - device:media.open_on_tv
  - device:chat.get_group_context
  - device:alarm.create

