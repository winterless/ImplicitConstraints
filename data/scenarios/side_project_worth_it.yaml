execution_rules:
  - 必须综合动机、可用时间和疲劳风险来做判断。
  - 不能只给泛泛鼓励或否定，而要说明主要取舍。
  - 如果当前负担过重，应允许给出“缩小范围试做”或“稍后开始”的建议。
