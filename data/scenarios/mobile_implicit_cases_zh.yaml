cases:
  - id: huangshan_couple_photos_last_year
    tool_category: photo_people
    original_question: 帮我查找我去年在黄山上拍的和老婆的照片。
    user_prompt: 帮我找出去年的黄山照片里，我和老婆同框的那些。
    implicit_reason: 用户表面上是在找照片，实际隐含了地点、人物和时间三个联合筛选条件。地点应优先用照片 GPS 判断，GPS 缺失时再用黄山视觉地标匹配补足；人物匹配应尽量在端侧做人脸识别以保护隐私；“去年”需要根据当前日期换算成明确的时间范围。
    hidden_constraints:
      - 优先使用照片元数据中的 GPS 作为地点真值。
      - 若 GPS 缺失，可退化到黄山视觉地标识别。
      - 人脸比对需要同时匹配“我”和“老婆”。
      - 时间范围应限定为上一自然年或过去一年，并在实现时固定口径。
    allowed_tools: *photo_people
    suggested_plan:
      - 先按时间范围筛出去年拍摄的照片。
      - 使用 GPS 锁定黄山；若缺失 GPS，再做黄山视觉匹配。
      - 对候选照片进行端侧双人人脸匹配，只保留我和老婆同时出现的照片。

  - id: focus_two_hours_family_boss_whitelist
    tool_category: focus_notifications
    original_question: 让我专心写两个小时报告，除了家人和老板谁也别烦我。
    user_prompt: 帮我开启两个小时的专注模式，只允许家人和老板的消息或来电打扰我。
    implicit_reason: 用户不是单纯想要一个计时器，而是要一个带白名单策略的免打扰流程。系统需要先建立两个小时的持续窗口，再从通讯录或标签中提取“家人”和“老板”集合，并把其他通知、来电和消息静音或延后显示。
    hidden_constraints:
      - 必须有明确的两小时持续时长。
      - 白名单应基于联系人标签、关系或用户已标注身份。
      - 默认静音对象是“除白名单外的所有人和应用”。
      - 不应误拦截来自家人和老板的高优先级通知。
    allowed_tools: *focus_notifications
    suggested_plan:
      - 创建两个小时的专注会话。
      - 提取家人和老板联系人，生成白名单。
      - 将其他通知静音，并在会话结束后自动恢复。

  - id: battery_last_until_home
    tool_category: battery_commute
    original_question: 保证我的手机电量能撑到我今晚回家。
    user_prompt: 帮我判断现在的电量能不能撑到今晚回家，不够的话自动进入省电策略。
    implicit_reason: 用户的真实目标不是查看电量，而是让剩余电量覆盖从当前时刻到回家的整段路程。系统需要估计回家所需时长，结合当前电量和耗电速率判断是否有缺口；如果风险较高，应冻结高耗电后台、降低亮度、限制联网等，而不是只给出一个被动提醒。
    hidden_constraints:
      - 需要估算当前到家的剩余路程或 ETA。
      - 需要评估当前电量与预计耗电之间的差值。
      - 若电量风险高，应自动执行分级省电策略。
      - 省电策略应优先影响高耗电后台，而不是直接破坏关键通信能力。
    allowed_tools: *battery_commute
    suggested_plan:
      - 先读取当前电量、预计续航和耗电画像。
      - 估算回家 ETA，并判断是否存在续航缺口。
      - 若不足，则冻结高耗电后台并应用省电方案。

  - id: low_usage_auto_renewals
    tool_category: subscriptions_billing
    original_question: 这个月我有哪些没怎么用的自动续费？帮我退掉。
    user_prompt: 帮我找出这个月低活跃但在自动续费的服务，并给我退订入口。
    implicit_reason: 用户要的是“值得取消的自动续费”，而不是所有扣费明细。系统需要先从短信、账单或订阅记录中找出自动续费项目，再结合屏幕使用时长或最近活跃度判断哪些服务“没怎么用”，最后给出退订入口或建议；直接自动退订会涉及风险，默认应先展示候选清单。
    hidden_constraints:
      - 自动续费候选应来自账单、短信或系统订阅记录。
      - “没怎么用”需要结合近一段时间的 App 活跃度。
      - 默认应先展示可退订列表，而不是无确认批量退订。
      - 不同订阅渠道可能对应不同的退订入口。
    allowed_tools: *subscriptions_billing
    suggested_plan:
      - 收集本月自动续费项目和扣款时间。
      - 读取对应应用或服务的近期活跃度。
      - 输出低活跃订阅列表，并附上各自退订链接或入口。

  - id: boss_pdf_action_items
    tool_category: document_tasks
    original_question: 老板刚发的这个几十页的PDF，告诉我我需要干嘛就行。
    user_prompt: 帮我读一下老板刚发的 PDF，只总结跟我相关的行动项。
    implicit_reason: 用户不是需要全文摘要，而是需要与自己职责相关的专属行动项提炼。系统需要先解析长文档，再结合用户角色、项目标签或本地知识做检索增强，最后输出可执行、可排序的事项清单，而不是泛泛的内容概述。
    hidden_constraints:
      - 文档可能很长，需先做结构化解析。
      - 需要引入本地用户标签、岗位职责或项目上下文。
      - 输出重点应是行动项、截止时间、负责人和依赖关系。
      - 若信息不足，应显式标出不确定项。
    allowed_tools: *document_tasks
    suggested_plan:
      - 先解析 PDF 的章节、表格与关键段落。
      - 结合用户标签检索与本人职责相关的内容。
      - 只输出行动项、时间点、依赖方和优先级。

  - id: can_i_make_the_concert
    tool_category: schedule_travel
    original_question: 帮我看看今晚7点杭州的林俊杰演唱会我能去不。
    user_prompt: 帮我判断今晚 7 点杭州的林俊杰演唱会我现在还赶不赶得上。
    implicit_reason: 用户实际要的是时间可行性判断，而不是单点查询。系统需要检查本地日历空闲时间，再估算当前到演唱会场馆的出发到达耗时，最后用演出开始时间和必要缓冲时间做比对，给出是否来得及以及最晚出发时间。
    hidden_constraints:
      - 需要确认今晚是否已有日程冲突。
      - 需要估算到目标场馆的真实 ETA。
      - 判断逻辑应包含入场、检票等缓冲时间。
      - 输出应包括结论和关键原因，而不只是路线信息。
    allowed_tools: *schedule_travel
    suggested_plan:
      - 先确认今晚 7 点前后的空闲窗口。
      - 计算到会场的最优路线和 ETA。
      - 对比演出开始时间与入场缓冲，输出能否赶到。

  - id: leave_early_tomorrow_morning
    tool_category: schedule_travel
    original_question: 我明天早上需要提前出门吗？
    user_prompt: 帮我判断我明天早上是否需要比平时更早出门，并帮我调整闹钟。
    implicit_reason: 用户真正关心的是明早首个行程是否会因天气或路况导致出发时间前移。系统需要读取明天第一个日程，结合天气、路况与通勤时长估算额外缓冲，再决定是否需要提前，并同步修改闹钟或提醒。
    hidden_constraints:
      - 只需要关注明早第一个关键日程。
      - 需要结合天气与交通异常，而不是只看固定通勤时间。
      - 结论应体现在新的起床时间或出门时间上。
      - 若无需提前，也应明确说明原因。
    allowed_tools: *schedule_travel
    suggested_plan:
      - 读取明天早上的首个日程及地点。
      - 查询对应时段的天气与路线耗时。
      - 计算所需缓冲并调整闹钟。

  - id: packing_check_for_tomorrow_trip
    tool_category: travel_packing
    original_question: （打开行李箱）看看我明天的出差还漏了什么？
    user_prompt: 帮我看看明天这趟出差还有什么没装，尤其提醒容易漏掉的东西。
    implicit_reason: 用户不是要一个固定行李清单，而是要结合目的地、出差天数、天气和当前箱内物品做动态缺失检测。系统应先获取行程信息和目的地天气，再识别箱内已有物品，最后提示高价值盲区，例如雨伞、充电器、证件或药品。
    hidden_constraints:
      - 需要先确定目的地、日期和停留时长。
      - 需要结合当地天气判断额外物品。
      - 箱内识别结果和推荐清单需要做差集比对。
      - 优先提示“容易漏但影响大”的物品。
    allowed_tools: *travel_packing
    suggested_plan:
      - 读取出差信息与目的地天气。
      - 扫描箱内已有物品。
      - 输出缺失物品和原因，优先高风险遗漏项。

  - id: soft_boiled_egg_multi_timers
    tool_category: cooking_timers
    original_question: 帮我煮一个溏心蛋。
    user_prompt: 帮我把煮溏心蛋的步骤和每一步提醒都安排好。
    implicit_reason: 用户要的不是纯知识问答，而是一个可执行的厨房流程编排。系统应先确定溏心蛋做法和各步骤时长，再把这些步骤转化成多个连续计时器或提醒，减少用户手动盯表的负担。
    hidden_constraints:
      - 需要把菜谱知识转成实际操作时间线。
      - 关键节点通常包含水开、入锅、捞出、过冷水等阶段。
      - 提醒最好是链式触发，而不是只设一个总计时器。
      - 输出应兼顾简单可执行，而不是罗列过多烹饪分支。
    allowed_tools: *cooking_timers
    suggested_plan:
      - 先查询溏心蛋的标准步骤和时间。
      - 生成每个关键步骤的计时器或提醒。
      - 按时间顺序串联，形成可执行流程。

  - id: arrive_home_turn_on_devices
    tool_category: smart_home
    original_question: 等下快到家的时候，把家里的空调和热水器打开。
    user_prompt: 快到家的时候帮我把家里的空调和热水器提前打开。
    implicit_reason: 用户不是要立刻开设备，而是要基于到家 ETA 的条件触发自动化。系统需要持续感知回家路线或导航状态，在 ETA 进入阈值区间时静默执行智能家居动作，避免过早开启导致浪费。
    hidden_constraints:
      - 需要明确目标是“快到家”而非立即执行。
      - 应基于 ETA 阈值触发，而不是固定时间触发。
      - 需要同时控制多个设备。
      - 自动化应在后台低打扰完成。
    allowed_tools: *smart_home
    suggested_plan:
      - 读取当前回家导航状态和 ETA。
      - 创建接近到家时触发的自动化规则。
      - 在 ETA 命中阈值时开启空调和热水器。

