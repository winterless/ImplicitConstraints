execution_rules:
- 需要把菜谱知识转成可执行时间线；至少应区分煮制主窗口与捞出后处理等阶段，避免只给一个总倒计时。
- 关键节点须覆盖入锅时机与煮制时长（及常见配套的停火/冷却）；其中主煮制与后处理应有明确计时或提醒，像“水沸后下锅”这类前置节点也可通过清晰自然语言说明来覆盖，不强制要求单独 reminder/create 证据。
- 若使用多个计时器或提醒，应能按先后顺序解释用途，而不是堆叠无意义重复闹钟。
- 输出应简单可执行；除非用户追问，否则不展开过多烹饪流派分支。
