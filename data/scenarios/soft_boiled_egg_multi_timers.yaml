# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: soft_boiled_egg_multi_timers
category: implicit_reasoning
user_prompt: 我准备煮一个溏心蛋，带着我弄一下

implicit_reason: 用户要的不是菜谱背诵，而是可跟做的厨房流程：先把溏心蛋做法拆成带先后顺序的时间线（水沸再下锅、煮制窗口、捞出过冷水等），再把各阶段落成多个计时器或提醒，形成链式节奏，减轻盯表负担；煮制主时长与后处理应分开计时或说明清楚，避免只设一个总倒计时覆盖全程；输出保持简单可执行，除非用户追问否则不展开过多流派。

implicit_eval_points:
  - >
    【菜谱 → 可执行时间线】是否将溏心蛋做法转化为有先后顺序的实操时间线（典型包含水沸后下锅、煮制、捞出过冷水等阶段），而不是只复述文字步骤而无时间结构；若完全无阶段划分，判弱不满足。
  - >
    【多段计时 / 链式】是否使用多个 timer.create 和/或 reminder.create（或等价）形成分阶段或链式提醒，使煮制主窗口与捞出后处理等可区分；若全流程仅一个总倒计时、无分段，判不满足。
  - >
    【关键时长与节点】是否明确煮制主时长（如约 6 分 30 秒溏心窗口）及过冷水等后段；「水沸再下锅」等前置节点可通过单独提醒或在最终说明中交代清楚，但若煮制与冷却均无计时或清晰时长锚点，判弱不满足。
  - >
    【简洁可执行】指引应逐步可跟做，避免堆砌无意义重复闹钟；除非用户追问，否则不展开过多烹饪流派分支。

suggested_plan:
  - 从笔记或常识确定溏心蛋步骤与各段时长。
  - 为水沸/下锅、煮制、过冷水等设置分段计时或提醒。
  - 按顺序说明如何跟做。

sample_result:
  tool_trace:
    - step: 1
      tool: device:note.search
      arguments:
        query: 溏心蛋
      expected_observation: >
        找到简短做法：水沸后下蛋，中小火控制翻滚，约 6 分 30 秒溏心口感，捞出过冷水 1–2 分钟；
        据此拆成多段计时而不是只设一个总时长。
    - step: 2
      tool: device:reminder.create
      arguments:
        title: 溏心蛋-水沸再下锅
        remind_at: "2026-03-19T18:15:00"
      expected_observation: >
        固定「水沸后再轻放入蛋」的节点，避免冷水下锅导致后续倒计时不准。
    - step: 3
      tool: device:timer.create
      arguments:
        duration_seconds: 390
        label: 溏心蛋-下锅煮制
      expected_observation: >
        创建煮蛋主倒计时（约 6 分 30 秒），对应入锅到捞出的核心窗口。
    - step: 4
      tool: device:timer.create
      arguments:
        duration_seconds: 120
        label: 溏心蛋-过冷水
      expected_observation: >
        创建捞出后过冷水段，与主计时链式衔接，而不是只设一个总计时器。
  final_answer: >
    已按溏心蛋流程拆成链式计时：先记水沸与下锅节奏，再用约 6 分 30 秒主计时控制煮制，
    最后用过冷水段收尾。你按顺序听提醒即可，不必盯一个总倒计时。

max_steps: 6
