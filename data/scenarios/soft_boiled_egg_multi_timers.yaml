id: soft_boiled_egg_multi_timers
category: implicit_reasoning
user_prompt: 帮我把煮溏心蛋的步骤和每一步提醒都安排好。
original_question: 帮我煮一个溏心蛋。
tool_category: cooking_timers
implicit_reason: 用户要的不是纯知识问答，而是一个可执行的厨房流程编排。系统应先确定溏心蛋做法和各步骤时长，再把这些步骤转化成多个连续计时器或提醒，减少用户手动盯表的负担。
hidden_constraints:
- 需要把菜谱知识转成实际操作时间线。
- 关键节点通常包含水开、入锅、捞出、过冷水等阶段，但不要求每个节点都必须单独落成一条工具调用；若前置节点已在最终说明中明确交代，且主计时链完整，可视为已覆盖。
- 提醒最好是链式触发，而不是只设一个总计时器。
- 输出应兼顾简单可执行，而不是罗列过多烹饪分支。
suggested_plan:
- 先查询溏心蛋的标准步骤和时间。
- 生成每个关键步骤的计时器或提醒。
- 按时间顺序串联，形成可执行流程。
sample_result:
  tool_trace:
  - step: 1
    tool: device:note.search
    arguments:
      query: 溏心蛋
    expected_observation: >
      找到简短做法：水沸后下蛋，中小火控制翻滚，约 6 分 30 秒溏心口感，捞出过冷水 1–2 分钟；
      据此拆成多段计时而不是只设一个总时长。
  - step: 2
    tool: device:reminder.create
    arguments:
      title: 溏心蛋-水沸再下锅
      remind_at: "2026-03-19T18:15:00"
    expected_observation: >
      固定“水沸后再轻放入蛋”的节点，避免冷水下锅导致后续倒计时不准。
  - step: 3
    tool: device:timer.create
    arguments:
      duration_seconds: 390
      label: 溏心蛋-下锅煮制
    expected_observation: >
      创建煮蛋主倒计时（约 6 分 30 秒），对应入锅到捞出的核心窗口。
  - step: 4
    tool: device:timer.create
    arguments:
      duration_seconds: 120
      label: 溏心蛋-过冷水
    expected_observation: >
      创建捞出后过冷水段，与主计时链式衔接，而不是只设一个总计时器。
  final_answer: >
    已按溏心蛋流程拆成链式计时：先记水沸与下锅节奏，再用约 6 分 30 秒主计时控制煮制，
    最后用过冷水段收尾。你按顺序听提醒即可，不必盯一个总倒计时。
max_steps: 6
allowed_tools:
- device:timer.create
- device:timer.open
- device:timer.check
- device:timer.modify
- device:timer.cancel
