execution_rules:
  - 必须结合市场报价和用户持仓上下文来做判断，不能只报价格。
  - 最终输出应明确偏向买入还是卖出，并给出关键理由。
  - 不能忽略价格接近阻力位和用户已盈利仓位这两个核心证据。
