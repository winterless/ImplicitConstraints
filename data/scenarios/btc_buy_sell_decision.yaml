id: btc_buy_sell_decision
category: implicit_reasoning
user_prompt: 我现在应该买入还是卖出 BTC？
original_question: Can you tell me the current price of Bitcoin (BTC) on Bitget? I need this to help me decide whether to buy or sell.
tool_category: crypto_trade_judgment
implicit_reason: The user superficially asks for price, but the real task is to make a near-term trading judgment. The system must combine current market context with the user's existing position and risk profile, then provide a recommendation with reasons rather than a raw quote.
hidden_constraints:
  - Price lookup alone is insufficient; the recommendation must account for current trend context.
  - The user's existing BTC position and average cost materially affect whether buy or sell is more reasonable.
  - The final answer should include a clear recommendation with key reasons, not just a number.
  - The system should avoid aggressive advice that ignores risk and overextension signals.
suggested_plan:
  - Query the current BTC quote and recent trend on Bitget.
  - Query the user's current BTC position and cost basis.
  - Use both to decide whether buying or selling is more justified right now.
sample_result:
  tool_trace:
    - step: 1
      tool: device:market.get_asset_quote
      arguments:
        symbol: BTC
        venue: Bitget
      expected_observation: >
        当前价格约 112800 美元，7 日涨幅 8.9%，趋势为 overextended_uptrend，
        且已接近 113000-114500 的阻力区，动量信号为 overbought。
    - step: 2
      tool: device:portfolio.get_asset_position
      arguments:
        symbol: BTC
      expected_observation: >
        用户已有 0.45 BTC，平均成本 108400 美元，当前已处于盈利状态，
        且 BTC 已占组合 32%，风险承受能力仅为 moderate。
  final_answer: >
    我会更偏向“逢高减一点”，而不是现在继续追买。理由是 BTC 近一周已经明显上冲、
    当前价格靠近阻力位且动量偏过热，而你手里的仓位本身已经盈利并占组合较高比例。
    如果你不想明显降仓，至少也不建议在这里追高买入。
max_steps: 4
allowed_tools:
  - device:market.get_asset_quote
  - device:portfolio.get_asset_position
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
