execution_rules:
  - 必须先检查预订详情，再取消。
  - 只有在可取消且无额外风险时，才可直接执行取消。
  - 最终状态应显示预订已取消。
evaluation_rubric:
  - criterion: The agent inspected reservation details first.
    check:
      type: action_before
      first: device:reservations.get_details
      second: device:reservations.cancel
  - criterion: The reservation was cancelled.
    check:
      type: state_eq
      path: reservations.current.status
      value: cancelled
