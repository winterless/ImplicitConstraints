execution_rules:
  - 必须先检查订单状态和取消窗口，再执行取消。
  - 当订单仍在 deadline 之前且可取消时，应立即完成取消。
  - 成功路径应在最终状态中体现订单已取消。
evaluation_rubric:
  - criterion: The agent checked order status before urgent cancellation.
    check:
      type: action_before
      first: device:commerce.get_recent_order_status
      second: device:commerce.cancel_order
  - criterion: The mistaken order was cancelled before the deadline.
    check:
      type: state_eq
      path: orders.current.status
      value: cancelled
