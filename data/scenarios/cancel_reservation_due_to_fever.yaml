execution_rules:
  - 必须先检查预订详情和医疗例外条件，再决定是否取消。
  - 若缺少必要医疗材料，不能把取消视为已安全完成。
  - 最终输出应说明当前为什么不宜直接取消，以及更安全的下一步。
