id: focus_two_hours_family_boss_whitelist
category: implicit_reasoning
user_prompt: 帮我开启两个小时的专注模式，只允许家人和老板的消息或来电打扰我。
original_question: 让我专心写两个小时报告，除了家人和老板谁也别烦我。
tool_category: focus_notifications
implicit_reason: 用户不是单纯想要一个计时器，而是要一个带白名单策略的免打扰流程。系统需要先建立两个小时的持续窗口，再从通讯录或标签中提取“家人”和“老板”集合，并把其他通知、来电和消息静音或延后显示。
hidden_constraints:
- 必须有明确的两小时持续时长。
- 白名单应基于联系人标签、关系或用户已标注身份。
- 默认静音对象是“除白名单外的所有人和应用”。
- 不应误拦截来自家人和老板的高优先级通知。
suggested_plan:
- 创建两个小时的专注会话。
- 提取家人和老板联系人，生成白名单。
- 将其他通知静音，并在会话结束后自动恢复。
sample_result:
  tool_trace:
    - step: 1
      tool: device:profile.get_user_labels
      arguments: {}
      expected_observation: >
        标签中应能解析出「家人」与「老板」对应的联系人分组或关系标记，用作白名单依据。
    - step: 2
      tool: device:focus.start_session
      arguments:
        duration_minutes: 120
        label: 报告撰写专注
      expected_observation: >
        专注会话创建成功，持续约两小时，为后续通知策略提供时间边界。
    - step: 3
      tool: device:notifications.set_delivery_policy
      arguments:
        mode: allowlist
        allowed_relationships:
          - family
          - boss
        suppress_others: true
      expected_observation: >
        非白名单来电与消息被抑制或延后，仅家人与老板可穿透打扰。
  final_answer: >
    已为你开启约两小时的专注会话，并把通知策略切成白名单模式：只放行家人与老板的消息或来电，其余一律静音或延后展示。
    会话结束后再恢复常规通知，避免误拦高优先级联系人。
max_steps: 6
allowed_tools:
- device:focus.start_session
- device:notifications.set_delivery_policy
- device:alarm.create
- device:alarm.check
- device:alarm.cancel
- device:reminder.create
- device:reminder.check
- device:schedule.get_next_event
- device:schedule.list_free_slots
- device:profile.get_user_labels
- device:note.search
- device:note.open
- device:power.get_battery_status
- device:weather.get_forecast
- device:travel.get_trip_brief
- device:weather.check_weather
- device:power.freeze_background_apps
- device:power.apply_saving_plan
- device:timer.create
