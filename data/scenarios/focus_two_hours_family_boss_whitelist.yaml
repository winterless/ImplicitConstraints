execution_rules:
- 必须先有明确的两小时持续时长（专注会话或等价计时），再配置通知白名单。
- 白名单必须基于联系人标签、关系或用户已标注身份解析出「家人」「老板」集合，不得凭空猜测号码。
- 默认静音对象是除白名单外的其余人与应用通知；配置后不得把家人与老板一并静音。
