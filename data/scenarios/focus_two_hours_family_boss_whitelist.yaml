# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points（见 evaluator._build_evaluator_user_prompt）；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
# scenario id 含 family 为历史沿用；本题 user 诉求以「老板电话」为主。
id: focus_two_hours_family_boss_whitelist
category: implicit_reasoning
user_prompt: 今天要和老板电话沟通方案，不要让别人打扰我。

implicit_reason: 用户表面要「不被打扰」，真实目标是在与老板通话/沟通方案时避免无关通知与来电打断。宜先结合日程弄清沟通大致起止，再建立与之匹配的专注/勿扰边界；并从标签或联系人关系中识别老板，使老板侧可穿透。沟通结束后应能恢复正常通知，避免无限期静音；这种恢复既可以通过会话/策略自动到期落实，也可以通过提醒或用户手动关闭来完成，不必强制要求 assistant 在文案中逐字说明。其余人应在沟通时段内被抑制或延后；若标签里还有家人等分组可合理取舍，但**绝不能**把老板挡在免打扰之外。

# 三条隐含考点（LLM 评测时应逐条给出 passed + reasoning）；字段以轨迹与 final_world_state 为准。
implicit_eval_points:
  - >
    【日程对齐与沟通后恢复】是否先查看当日/近期日程（如 schedule.get_next_event）或等价信息，识别「与老板沟通方案」的大致时间段，再让专注会话时长或勿扰范围与之合理匹配（而非随口设一个分钟数）。沟通结束后是否有可识别的恢复常规通知机制：例如依赖专注会话或通知策略自动到期、提醒用户手动关闭勿扰、或设置恢复类闹钟/提醒；只要机制已被落实，不强制要求 assistant 在文案中显式复述。若完全不看日程，或终态上看不到任何恢复路径而可能导致长期静音，判弱不满足。
  - >
    【老板身份与白名单依据】是否通过 profile.get_user_labels（或等价）识别老板相关标签/分组，再配置通知策略；若未基于标签或关系、凭空指定号码，或配置后老板仍被抑制，判不满足。
  - >
    【非老板要静音】白名单之外的人：来电与消息是否会被静音、延后或不再默认弹窗（与 notifications 策略中「仅老板可打扰、其余抑制」一致）。若嘴上说不让别人打扰，策略上却仍允许所有联系人正常打断，判弱不满足。

suggested_plan:
  - 查看日程中与老板沟通方案的时间段（若有）。
  - 读取用户标签，确认老板（及可选家人）分组。
  - 启动与沟通时长匹配的专注会话，并设置通知：仅老板可打扰，其余抑制。
  - 落实沟通结束后的恢复路径（自动到期、手动关闭或提醒其一即可）。

sample_result:
  tool_trace:
    - step: 1
      tool: device:schedule.get_next_event
      arguments: {}
      expected_observation: >
        日程中有「与老板电话沟通方案」条目及起止时间，可与专注时长、勿扰范围对齐。
    - step: 2
      tool: device:profile.get_user_labels
      arguments: {}
      expected_observation: >
        能解析出 contact_group_boss 等标签，作为老板白名单依据（亦可同时看到家人等分组，由推理决定是否并入放行）。
    - step: 3
      tool: device:focus.start_session
      arguments:
        duration_minutes: 60
        label: 与老板电话沟通方案
      expected_observation: >
        专注会话时长与日程中的沟通窗口大致一致（示例为 60 分钟）；结束后可恢复或依赖会话到期。
    - step: 4
      tool: device:notifications.set_delivery_policy
      arguments:
        mode: allowlist
        allowed_relationships:
          - boss
        suppress_others: true
      expected_observation: >
        仅老板关系可穿透，其余通知被抑制或延后；与「不要让别人打扰」一致。
  final_answer: >
    已按日程里的沟通时段开启专注，并设为仅老板可打扰；其他人来电与消息会静音或延后。沟通结束后会按既定机制恢复常规通知，避免长期静音。

max_steps: 6
allowed_tools:
  - device:focus.start_session
  - device:notifications.set_delivery_policy
  - device:alarm.create
  - device:alarm.check
  - device:alarm.cancel
  - device:reminder.create
  - device:reminder.check
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:profile.get_user_labels
  - device:note.search
  - device:note.open
  - device:power.get_battery_status
  - device:weather.get_forecast
  - device:travel.get_trip_brief
  - device:weather.check_weather
  - device:power.freeze_background_apps
  - device:power.apply_saving_plan
  - device:timer.create

