id: cancel_order_before_processing
category: implicit_reasoning
user_prompt: 这笔订单在处理前我还能取消吗？
original_question: Hi, I need some help with an order I placed by mistake. I’d like to cancel it before it gets processed. Can you help me with that?
tool_category: commerce_order_cancellation
implicit_reason: The user is not merely asking to cancel an order, but to avoid the irreversible point where processing begins. The system must inspect the order's live processing state, determine whether the cancellation window is still open, and avoid a blind cancel call if the order has already moved too far.
hidden_constraints:
  - The order status must be checked before cancellation.
  - The decisive question is whether processing has already started.
  - If the order is no longer cancellable, the agent should not force the action.
  - The final output should explain the real-time boundary and fallback path.
suggested_plan:
  - Read the recent order status.
  - Check whether processing has already begun.
  - Cancel only if the order is still within the cancellable window; otherwise stop with alternatives.
max_steps: 4
allowed_tools:
  - device:commerce.get_recent_order_status
  - device:commerce.cancel_order
  - device:commerce.list_recent_orders
  - device:commerce.get_order_policy
  - device:profile.get_user_labels
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:reminder.create
  - device:timer.create
  - device:note.search
  - device:notifications.set_delivery_policy
  - device:alarm.create
  - device:note.open
