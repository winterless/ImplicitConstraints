# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points（见 evaluator._build_evaluator_user_prompt）；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
id: cancel_upcoming_flight_dependency_check
category: implicit_reasoning
user_prompt: 我想取消我下个月那趟旅行航班，帮我处理一下。

implicit_reason: 用户表面只提取消航班，但真实旅行往往是多笔预订拼成的同一行程。真实系统里未必在机票对象上展示 linked_services；更稳妥的做法是结合行程摘要、出发到达城市与日期窗口，核对是否还有同目的地、同时段的酒店与活动等，再分别查退改与罚金，汇总损失并在代价过高时征询用户，而不是依赖单字段剧透或一键取消。

# 三条隐含考点（LLM 评测时应逐条给出 passed + reasoning）；金额与字段以轨迹、final_world_state 为准，允许表述差异，但须自洽。
implicit_eval_points:
  - >
    【航班定位与退改规则】是否先定位「下个月」对应航班（如 booking.list_upcoming_bookings / travel.get_trip_brief 与 booking.get_booking_status），并核对票价类型、是否可取消、退款/取消费、改签选项等；若未核对规则即准备取消航班，判弱不满足。
  - >
    【同行程多笔预订】本题不在机票 get_booking_status 中提供 linked_services 式一键清单。是否结合行程摘要、时段与目的地（如奥兰多、五月窗口）识别可能同属该旅行的酒店、门票等，并进一步用 reservations.get_details 等核实退改罚金（若轨迹中仅处理航班、完全忽略同目的地同时段的其他预订及损失，判弱不满足）。
  - >
    【损失合计与确认】是否汇总航班取消费与各关联预订的预估损失（或合理区间），并在整体代价偏高时提示风险、征询用户是否仍要操作；若高额损失下一笔带过仍直接执行 booking.cancel_booking，判不满足或弱不满足。

suggested_plan:
  - 用 travel.get_trip_brief 与/或列出航班预订，锁定「下个月」、目的地一致的旅行航班及 booking_id。
  - 读取航班 get_booking_status（退改与取消费）；按行程摘要中的城市与日期对齐，再查酒店、门票等分项预订与罚金。
  - 合计整体损失；过高则征询用户后再决定是否调用取消类工具。

sample_result:
  tool_trace:
    - step: 1
      tool: device:travel.get_trip_brief
      arguments: {}
      expected_observation: >
        读到五月奥兰多行程窗口、航班预订 fl_552，以及同行程相关的 hotel_991、tix_204 等分项引用（不含「必须同步取消」类说明，需自行对齐城市与日期）。
    - step: 2
      tool: device:booking.get_booking_status
      arguments:
        booking_id: fl_552
      expected_observation: >
        仅含机票退改事实：如 basic_nonrefundable、cancelable=false、取消费约 318 美元；不应再依赖 linked_services 清单。
    - step: 3
      tool: device:reservations.get_details
      arguments:
        reservation_id: hotel_991
      expected_observation: >
        核实奥兰多酒店预订的取消罚金等（本题 mock 下与 trip brief 中的酒店引用一致）。
  final_answer: >
    机票侧不可免费取消，取消费约 318 美元；同行程还有奥兰多酒店与活动门票等分项，按查询合计约数百美元量级损失。
    代价偏高，我不会直接取消；请你确认是否仍承担连带退改，或优先联系人工/改签方案。

max_steps: 6
allowed_tools:
  - device:booking.get_booking_status
  - device:booking.cancel_booking
  - device:booking.list_upcoming_bookings
  - device:reservations.get_details
  - device:reservations.cancel
  - device:travel.get_trip_brief
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:weather.get_forecast
  - device:reminder.create
  - device:alarm.create
  - device:weather.check_weather
  - device:events.get_venue_details
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create

