execution_rules:
  - 必须同时读取热门游戏信息与用户偏好标签，并据此做取舍，不得只用其一。
  - 不能只复述热门榜单或类型表，须给出明确的“下一款玩什么”及简短理由。
  - 对与用户标签明显冲突的高热度作品，应说明为何不优先推荐，而不是盲推榜首。
evaluation_rubric: []
