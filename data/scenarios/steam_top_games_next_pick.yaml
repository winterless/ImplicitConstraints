id: steam_top_games_next_pick
category: implicit_reasoning
user_prompt: 根据 Steam 热门游戏及其类型，推荐我下一款该玩什么。
original_question: What are the current most played Steam games, and which genres do they fall into to help me decide what to play next?
tool_category: game_choice_recommendation
implicit_reason: The user is not asking for a raw popularity table, but for help deciding what to play next. The system should combine trending Steam titles with the user's own genre preferences and session style, then recommend a next game rather than stopping at a list.
hidden_constraints:
  - The answer must go beyond listing top games and genres.
  - The recommendation should account for the user's preference and tolerance labels.
  - The final output should include a concrete recommendation plus brief reasons.
  - Highly popular titles that clash with the user's preferences should not be recommended blindly.
suggested_plan:
  - Read current top Steam titles and their genres.
  - Read the user's play-preference labels.
  - Recommend the most suitable next pick with reasons.
sample_result:
  tool_trace:
  - step: 1
    tool: device:gaming.get_top_played_titles
    arguments: {}
    expected_observation: >
      榜单含 CS2、星露谷、绝地潜兵 2、环世界等；类型从竞技射击到治愈模拟不等，
      不能只看排名推荐。
  - step: 2
    tool: device:profile.get_user_labels
    arguments: {}
    expected_observation: >
      用户偏好轻松、短会话、回避强竞技语音环境，与头部竞技射击类存在冲突。
  final_answer: >
    结合热度与标签，更建议你下一款先玩《星露谷》：仍在热门前列，类型偏治愈与经营，
    典型单局时长与你“晚间短会话”更匹配，也避开 CS2 的强竞技与语音压力。若你想再轻一点，
    可以把《绝地潜兵 2》当作备选，但它更偏合作射击、单局偏长，贴合度次于《星露谷》。
max_steps: 4
allowed_tools:
  - device:gaming.get_top_played_titles
  - device:profile.get_user_labels
  - device:media.get_watch_history
  - device:media.search_recommendations
  - device:media.open_on_tv
  - device:chat.get_group_context
  - device:podcasts.list_unheard
  - device:podcasts.play_episode
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:note.search
  - device:note.open
  - device:reminder.create
  - device:alarm.create
  - device:timer.create
world:
