execution_rules:
- 须结合观影历史与偏好标签做筛选，不得与“已看过且近期仍占推荐位”的片重复撞车（除非用户明确要重温）。
- 应主动排除烧脑、沉重、强惊悚等与高负担体验相关的标签或类型，并说明排除理由。
- 推荐须对齐“周末放松”的情绪目标，给出可执行的一到两部优先选，而不是泛泛片单。
- 若工具链支持电视端，应尝试完成投屏/打开播放页动作或说明受阻原因，而不是只口头说“可以投电视”。
