id: weekend_relaxing_movie
category: implicit_reasoning
user_prompt: 帮我找一部适合周末放松、不要太烧脑的电影。
original_question: 帮我找一部周末放松看的电影。
tool_category: media_entertainment
implicit_reason: 用户不是泛化求推荐，而是带有情绪目标和内容约束的推荐需求。系统应结合高分观影历史、用户偏好与未观看状态，排除烧脑和高负担标签，优先给出轻松喜剧或治愈向作品，并可直接推送到电视端。
hidden_constraints:
- 需要参考用户过往观影记录和偏好。
- 应排除烧脑、沉重或已看过内容。
- 推荐结果需要满足“周末放松”这一情绪目标。
- 若可跨设备联动，最好能直接投送到电视。
suggested_plan:
- 分析用户高分观影记录与类型偏好。
- 排除烧脑和已看过内容。
- 输出最适合放松的一到三部电影，并可直接打开电视播放页。
sample_result:
  tool_trace:
  - step: 1
    tool: device:media.get_watch_history
    arguments:
      days: 90
    expected_observation: >
      近期高分多为轻松喜剧与治愈向，已看过清单包含若干热门片，应避免重复推荐同一片。
  - step: 2
    tool: device:media.search_recommendations
    arguments:
      mood: 周末放松
      unseen_only: true
      excluded_tags:
      - 烧脑
      - 惊悚
      - 沉重
    expected_observation: >
      候选收敛到轻松、低负担片单，排除高悬疑或压抑向标签。
  - step: 3
    tool: device:media.open_on_tv
    arguments:
      media_id: film_padington_2014
    expected_observation: >
      在电视端打开选定影片详情/播放页，便于周末直接观看。
  final_answer: >
    结合你近期偏好与“不要太烧脑”，更推荐《帕丁顿熊》这类轻松治愈、节奏温和的片子作为周末放松首选；
    它不在你近期已看高分重复区（以当前观影记录为准），并已尝试在电视端打开播放页，你一键即可开始。
max_steps: 6
allowed_tools:
- device:media.get_watch_history
- device:media.search_recommendations
- device:media.open_on_tv
- device:podcasts.list_unheard
- device:podcasts.play_episode
- device:schedule.get_next_event
- device:profile.get_user_labels
- device:note.search
- device:note.open
- device:reminder.create
- device:timer.create
- device:schedule.list_free_slots
- device:chat.get_group_context
- device:alarm.create
