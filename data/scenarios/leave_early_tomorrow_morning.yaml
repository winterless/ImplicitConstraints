execution_rules:
- 必须以「明天上午第一个关键日程」为锚点，而不是被当天下午或晚间日程带偏。
- 判断是否提前出门时，必须同时参考通勤 ETA 与明日对应时段天气/路况带来的额外延误，不能只用晴天基线。
- 若结论是需要更早出发，应通过修改闹钟或等价提醒把新起床/出门时间写死；若不需要提前，也应说明天气与日程为何不构成挤压。
