# evaluation_profile: llm_only
# LLM 评测仅使用 implicit_eval_points（见 evaluator._build_evaluator_user_prompt）；不依赖 hidden_constraints / execution_rules / evaluation_rubric。
# 本题主题为练球湖网球场预订；文件名/ id 为历史沿用。
id: florence_photo_weather_backup
category: implicit_reasoning
user_prompt: 帮我订个明天下午4点练球湖附近的网球场。

implicit_reason: 用户表面是「订场」，但必须先查明天天气才知道是否适合露天场。全天阴雨时，前两处便宜且近的球场为露天，不宜再当首选；后两处为室内，但第三处下午4点档已满，第四处该时段可订却距离最远。合理结论应体现「先天气、再区分露天/室内、再在可订时段内权衡距离与价格」，而不是只看距离或只看低价。

# 三条隐含考点（LLM 评测时应逐条给出 passed + reasoning）；天气与场地字段以轨迹与 final_world_state 为准。
implicit_eval_points:
  - >
    【先查真实状态再行动】是否先查询明日练球湖附近（或用户所指区域）的天气，再讨论订场；只有查了工具返回才会知道全天阴雨。若未查天气就按晴天逻辑主推前两处露天场，判弱不满足。
  - >
    【跨对象依赖/整体损失或整体可行性】是否结合阴雨天气，区分前两处为露天、后两处为室内，并在雨天避免把露天场当作与需求一致的首选（除非用户明确冒雨）；若仍只推荐最近、最便宜的露天场而忽略室内选项，判弱不满足。
  - >
    【排序/筛选/最优选择】是否注意到第三处室内场在 16:00 档已满、第四处室内场该时段仍可订但为四处中最远；能否据此给出可执行结论（如仅第四处满足「明天下午4点+室内」）并说明距离/价格权衡，而非虚构已订场或忽略满档事实。

suggested_plan:
  - 查询明日练球湖片区天气，确认是否阴雨。
  - 检索练球湖附近网球场，区分露天/室内、价格、距离及目标时段余位。
  - 在阴雨条件下优先室内可订时段；向用户说明唯一可选或需改时间/接受距离等。

sample_result:
  tool_trace:
    - step: 1
      tool: device:weather.get_forecast
      arguments:
        location: 练球湖片区
        date: "2026-04-19"
        time_range: "08:00-22:00"
      expected_observation: >
        明日全天阴雨（或多段降水），不宜再默认适合露天练球。
    - step: 2
      tool: device:maps.search_nearby_places
      arguments:
        origin: 练球湖
        place_type: tennis_court
      expected_observation: >
        返回四处场地：前两处露天、较近且价低；两处室内，第三处 indoor 在 16:00 无档，第四处 indoor 该时段可订且步行距离最大。
  final_answer: >
    明天练球湖一带全天阴雨，前两处露天场虽近且便宜，但不适合作为优先选择。
    两处室内里，只有最远的第四处在明天下午 4 点仍有空档；第三处室内该时段已满。若必须坚持此时段与室内，只能接受更远距离；否则可改时段或改期。

max_steps: 6
allowed_tools:
  - device:weather.get_forecast
  - device:maps.search_nearby_places
  - device:schedule.get_next_event
  - device:schedule.list_free_slots
  - device:reminder.create
  - device:weather.check_weather
  - device:temperature.check
  - device:profile.get_user_labels
  - device:note.search
  - device:timer.create

