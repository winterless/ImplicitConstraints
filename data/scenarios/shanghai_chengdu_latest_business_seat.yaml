execution_rules:
  - 查询与排序必须针对用户所说的周五及指定发到站；若情景日期与周五不一致，以自然周内的周五日期为准并写明。
  - 必须返回周五当天、在仍有商务座余票约束下出发时间最晚的车次，不能把仅更晚但商务售罄的车次当作答案。
  - 票价必须与最终选定车次绑定，来自商务座报价字段，不得套用其他车次票价。
  - 输出须同时包含车次号、出发时间（或便于核验的时间信息）与商务座票价。
