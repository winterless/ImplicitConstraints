execution_rules:
  - 必须先枚举相似订单，再谈“哪一笔是误下单”；不能默认最近一单。
  - 在存在多笔相似订单时，未获用户点名确认前不得调用取消。
  - 正确完成条件是停在待确认状态，并说明取消窗口与退款/优惠影响。
