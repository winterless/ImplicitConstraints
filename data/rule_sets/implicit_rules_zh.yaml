rule_set_id: implicit_rules_zh
rule_set_type: implicit_rule_taxonomy
version: "0.1"
language: zh-CN
status: draft
description: >
  面向当前 ImplicitConstraints 工程的一份轻量隐式规则配置。目的不是替代具体场景，
  而是先把“隐式约束”的判断逻辑、场景分型、字段映射和出题模板整理出来，便于后续
  一致地构造 scenario YAML，并让 world / evaluator 的设计更稳定。

design_principles:
  - 先识别用户真实目标，再处理字面请求。
  - 先补足关键缺失信息，再决定是否执行动作。
  - 当任务存在 deadline、风险或副作用时，默认采用保守策略。
  - 场景里应把隐式约束写成可执行、可评测、可映射到 state 的规则。
  - 一个场景可包含多个隐式规则，但应有一个主规则类型。

scenario_runtime_fields:
  user_prompt:
    purpose: 给 Agent 看的自然语言请求，尽量短，不直接泄露隐藏规则。
  allowed_tools:
    purpose: 当前场景允许 Agent 使用的工具集合，也决定可观测证据边界。
  implicit_reason:
    purpose: 解释该题真正考什么隐式推理能力，主要服务作者和 evaluator。
  hidden_constraints:
    purpose: 枚举必须被考虑但没有在 user_prompt 明说的约束。
  suggested_plan:
    purpose: 给作者和 evaluator 看的理想求解步骤。
  world:
    purpose: 运行时环境定义。
    children:
      context:
        purpose: Agent 可直接看到的背景信息。
      state:
        purpose: 环境真实状态与可被工具查询的事实依据。
  execution_rules:
    purpose: 约束 world model 和 evaluator 的正确执行逻辑。
  evaluation_rubric:
    purpose: 当需要稳定打分时，把关键判断落成 deterministic criteria。

implicit_resolution_loop:
  - step: identify_surface_request
    question: 用户字面上说要做什么？
  - step: infer_real_goal
    question: 用户真正想解决的问题或达成的结果是什么？
  - step: enumerate_hidden_constraints
    question: 还需要满足哪些未明说的时间、风险、偏好、资源或解释要求？
  - step: gather_missing_evidence
    question: 需要查哪些工具或状态，才能判断这些隐式约束？
  - step: choose_safe_plan
    question: 在当前证据下，什么方案最能满足真实目标且副作用最小？
  - step: produce_outcome_with_reason
    question: 最终输出是否给出结论、理由、必要提醒，以及在不能执行时的替代方案？

rule_families:
  - rule_id: deadline_buffer
    name: 时间截止与缓冲
    summary: >
      任务是否可行，不取决于单点时间，而取决于“截止时间 - 必要缓冲 - 路途/处理耗时”
      后是否仍有可行动窗口。
    trigger_patterns:
      - 帮我来得及吗
      - 帮我准时到
      - 现在赶不赶得上
      - 今晚能不能去
    regex_patterns:
      - 来得及
      - in time
      - 赶得上
      - catch it
      - 准时
      - on time
      - 别迟到
      - do not be late
      - 最晚.*出发
      - latest.*leave
      - 几点.*走
      - what time.*leave
      - 还能不能去
      - can i still go
      - 能不能赶上
      - can i make it
      - 多久.*到
      - how long.*arrive
      - 现在出发.*行不行
      - if i leave now.*can i make it
    hidden_logic:
      - 需要识别真实 deadline，而不是只看目的地或事件名称。
      - 需要把入场、检票、登机、准备、切换等缓冲计入计算。
      - 需要在多个路线或方案中选择满足时间约束的那个。
    required_evidence:
      - next_event.start_time
      - boarding_buffer_minutes 或等价缓冲字段
      - routes eta_minutes / expected_arrival_time
      - current local_time
    recommended_reasoning_steps:
      - 查询相关事件或截止时间。
      - 查询可选路线或处理耗时。
      - 计算最晚可行动时间和实际 ETA。
      - 输出是否可行、最关键原因、必要时给出最晚出发时间。
    world_requirements:
      - state 中应存在明确的时间锚点和至少一个可比较 ETA。
      - 工具返回应允许比较多个候选路线或候选动作。
    evaluator_focus:
      - 是否查询了 deadline 相关事实。
      - 是否把缓冲计入判断。
      - 是否给出可行/不可行结论而非只返回中间信息。
    existing_scenarios:
      - airport_route_time
      - can_i_make_the_concert

  - rule_id: conflict_and_exclusivity
    name: 冲突检测与资源排他
    summary: >
      一个动作是否该执行，要先判断是否与已有日程、专注模式、设备状态或其他承诺冲突。
    trigger_patterns:
      - 帮我安排一下
      - 现在可以开吗
      - 今晚给我弄好
      - 这段时间别打扰我
    regex_patterns:
      - 有空
      - available
      - 冲突
      - conflict
      - 别打扰
      - do not disturb
      - 安排一下
      - schedule it
      - 这段时间.*可以吗
      - is this time okay
      - 今晚.*能不能
      - can i do it tonight
      - 有没有时间
      - do i have time
      - 空出来
      - free up time
      - 专注
      - focus
      - 和.*冲不冲突
      - does it conflict with
    hidden_logic:
      - 需要先检查已有安排或占用关系。
      - 不能只因为动作本身可执行，就忽略同时段冲突。
      - 若存在冲突，优先给出冲突解释或替代方案。
    required_evidence:
      - schedule / calendar events
      - free slots
      - focus mode or active session state
      - current task occupancy
    recommended_reasoning_steps:
      - 查询现有占用和未来窗口。
      - 判断是否存在时间、设备或人际冲突。
      - 若有冲突，输出不能直接执行的原因。
      - 若无冲突，再执行或建议下一步。
    world_requirements:
      - state 中应显式编码当前占用和冲突来源。
      - 工具应支持查询空档、下个事件或当前模式。
    evaluator_focus:
      - 是否先做冲突检查。
      - 是否避免与已有承诺相冲突的执行。
      - 是否说明冲突来源。
    existing_scenarios:
      - focus_two_hours_family_boss_whitelist
      - leave_early_tomorrow_morning
      - bedtime_home_settle

  - rule_id: safety_and_irreversibility
    name: 安全风险与不可逆后果
    summary: >
      对删除、取消、覆盖、扣费、暴露隐私等不可逆动作，默认需要更高证据标准或更保守行为。
    trigger_patterns:
      - 删掉吧
      - 帮我关了
      - 直接取消
      - 清理一下
    regex_patterns:
      - 删掉
      - delete
      - 取消
      - cancel
      - 清理一下
      - clean up
      - 直接处理
      - handle it directly
      - 自动续费
      - auto renew
      - 草稿
      - draft
      - 误删
      - delete by mistake
      - 永久
      - permanent
      - 隐私
      - privacy
      - 确认一下再
      - confirm first
    hidden_logic:
      - 需要识别动作是否不可逆或高代价。
      - 需要检查对象是否真的是“可删/可取消”的目标，而不是误伤草稿或高价值内容。
      - 当信息不足时，宁可停在确认、定位、列出候选，也不直接执行危险动作。
    required_evidence:
      - object status / draft flag / locked flag
      - cancellation cost or billing consequences
      - user labels / importance metadata
      - recent activity or ownership clues
    recommended_reasoning_steps:
      - 先定位目标对象。
      - 评估删除、取消或修改的副作用。
      - 若风险高且证据不足，先提示或提供安全替代方案。
      - 只有当目标明确且风险可接受时才执行。
    world_requirements:
      - state 中需提供可体现风险等级或对象状态的字段。
      - 危险工具的 failure_conditions 应覆盖误删、误取消或权限问题。
    evaluator_focus:
      - 是否避免危险的过度执行。
      - 是否体现保守策略。
      - 是否能区分真正目标与高风险近邻对象。
    existing_scenarios:
      - dangerous_delete_draft_notes
      - low_usage_auto_renewals

  - rule_id: latent_goal_vs_literal_request
    name: 真实目标高于字面请求
    summary: >
      用户说出的动作只是手段，真正需要判断的是背后的目标是否被满足。
    trigger_patterns:
      - 帮我看看
      - 帮我处理一下
      - 给我安排好
      - 帮我搞定
    regex_patterns:
      - 帮我看看
      - take a look
      - 帮我处理一下
      - handle this for me
      - 搞定
      - sort it out
      - 安排好
      - set it up
      - 能不能
      - can i
      - 适不适合
      - is it suitable
      - 值不值得
      - is it worth it
      - 怎么弄比较好
      - what is the best way
      - 给个建议
      - give me advice
      - 该不该
      - should i
    hidden_logic:
      - 不能把“查一下”“开一下”“设一下”当成最终答案。
      - 需要判断用户想要的是信息、决策、可行性还是最终执行结果。
      - 输出应围绕真实目标，而不是只返回工具原始结果。
    required_evidence:
      - 用户请求中的意图词
      - 场景里的 implicit_reason
      - 能支持最终决策的辅助信息
    recommended_reasoning_steps:
      - 从 user_prompt 识别真实交付物。
      - 设计最短但完整的求解链路。
      - 将工具结果转译为用户可用结论。
    world_requirements:
      - 场景作者需要在 implicit_reason 中明确写出“表面请求”和“真实目标”的差异。
    evaluator_focus:
      - 是否把中间查询升级成最终结论。
      - 是否避免只返回原始数据。
      - 是否满足用户真正想解决的问题。
    existing_scenarios:
      - can_i_make_the_concert
      - boss_pdf_action_items
      - podcast_match_commute

  - rule_id: multi_hop_evidence
    name: 多跳取证后才能行动
    summary: >
      正确答案需要至少两类信息拼接，单次工具调用无法直接得到。
    trigger_patterns:
      - 帮我判断一下
      - 这个适不适合
      - 帮我配一下
      - 帮我决定一下
    regex_patterns:
      - 判断一下
      - judge this
      - 查一下.*再
      - check.*then
      - 结合.*看看
      - combine.*and see
      - 对比一下
      - compare
      - 综合.*判断
      - evaluate together
      - 先看.*再看
      - first check.*then check
      - 匹配一下
      - match this
      - 合不合适
      - does it fit
      - 推荐哪个
      - which one do you recommend
      - 根据.*决定
      - decide based on
    hidden_logic:
      - 需要跨工具交叉验证，而不是凭一个信号下结论。
      - 若只做第一跳查询，通常会得到看似合理但不完整的答案。
      - 场景应鼓励“查 A -> 查 B -> 做组合判断”。
    required_evidence:
      - 至少两类不同工具来源的数据
      - 可组合的结构化字段
      - 能形成最终判断的 cross-check 逻辑
    recommended_reasoning_steps:
      - 先查主条件。
      - 再查补充条件。
      - 做联合判断或排序。
      - 输出组合后的结论。
    world_requirements:
      - state 设计要避免某一个工具直接暴露最终答案。
      - 不同工具返回之间应存在可组合关系。
    evaluator_focus:
      - 是否完成必要的多跳查询。
      - 是否使用组合后的证据做结论。
      - 是否避免单跳即结束。
    existing_scenarios:
      - podcast_match_commute
      - packing_check_for_tomorrow_trip
      - split_last_night_dinner_bill

  - rule_id: side_effect_optimization
    name: 副作用最小化与资源优化
    summary: >
      当多个方案都能部分完成任务时，应优先选副作用更小、资源更省、长期更稳的方案。
    trigger_patterns:
      - 帮我撑到回家
      - 尽量别打扰
      - 帮我省点
      - 找个最合适的
    regex_patterns:
      - 省电
      - save battery
      - 撑到回家
      - last until i get home
      - 别太吵
      - 别太吵
      - keep interruptions low
      - 尽量省
      - minimize usage
      - 副作用
      - side effects
      - 最合适
      - best fit
      - 便宜一点
      - cheaper
      - do not spend too much
      - 不要收费
      - no charge
      - 绕路
      - detour
      - 影响最小
      - minimize impact
    hidden_logic:
      - 不能只判断“能不能做”，还要比较“代价是否更低”。
      - 需综合电量、通知干扰、收费、 toll、绕路、重复提醒等副作用。
      - 若无法同时最优，应优先守住主目标，再次优化副作用。
    required_evidence:
      - battery level / power mode
      - traffic / toll / route trade-offs
      - notification policy
      - subscription cost / app activity
    recommended_reasoning_steps:
      - 确认主目标不能被破坏。
      - 列出候选方案的副作用。
      - 选择总体代价最小方案。
      - 向用户解释取舍。
    world_requirements:
      - state 中应提供代价维度，不能只有单一成功标记。
      - 工具返回应支持方案比较。
    evaluator_focus:
      - 是否先守住主任务目标。
      - 是否显式比较了副作用或资源消耗。
      - 最终方案是否体现合理取舍。
    existing_scenarios:
      - battery_last_until_home
      - low_usage_auto_renewals
      - arrive_home_turn_on_devices

  - rule_id: explanation_obligation
    name: 输出需包含结论与关键原因
    summary: >
      某些场景里，用户要的不是“动作已执行”，而是“判断结论 + 关键依据 + 必要提醒”。
    trigger_patterns:
      - 我能不能
      - 值不值得
      - 帮我判断
      - 适不适合
    regex_patterns:
      - 为什么
      - why
      - 原因
      - reason
      - 结论
      - conclusion
      - 值不值得
      - is it worth it
      - 能不能
      - can i
      - 适不适合
      - is it suitable
      - 帮我判断
      - help me decide
      - 告诉我.*原因
      - tell me the reason
      - 给我个建议
      - give me advice
      - 怎么选
      - how should i choose
    hidden_logic:
      - 输出不能停留在原始工具结果。
      - 需要把原因压缩成用户可理解的说明。
      - 在不可行场景中，原因与替代建议同样重要。
    required_evidence:
      - 最终判断依据
      - 支撑判断的关键字段
      - 可行时的建议动作，不可行时的替代方案
    recommended_reasoning_steps:
      - 先形成是/否或优先级结论。
      - 提炼 1 到 3 个核心原因。
      - 必要时补充提醒、截止时间或下一步建议。
    world_requirements:
      - 场景里应明确需要被解释的关键变量。
    evaluator_focus:
      - 最终答复是否是结论导向。
      - 是否包含关键原因。
      - 是否避免只给工具原始输出。
    existing_scenarios:
      - can_i_make_the_concert
      - weekend_relaxing_movie
      - podcast_match_commute

authoring_workflow:
  - step: choose_primary_rule_family
    guidance: 先选一个主规则类型，再决定是否叠加一到两个次规则。
  - step: write_literal_request
    guidance: 把 user_prompt 写得自然、口语化、略欠完整，但不要故意模糊到无从判断。
  - step: write_implicit_reason
    guidance: 用 2 到 4 句说明“表面请求是什么、真实目标是什么、为什么需要隐式推理”。
  - step: enumerate_hidden_constraints
    guidance: 只写真正决定成败的约束，通常 3 到 5 条即可。
  - step: design_state_and_tools
    guidance: 确保每条隐藏约束都能被某个工具或 state 字段支持，不要出现无法观测的规则。
  - step: convert_to_execution_rules
    guidance: 把 hidden_constraints 改写成可执行、可评测的 world contract。
  - step: add_evaluation_rubric_if_needed
    guidance: 若该题将用于稳定对比或批跑，优先补 deterministic rubric；仅 demo 时可先留空。

authoring_templates:
  implicit_reason_template: >
    用户表面上是在请求 {surface_action}，但真实目标是 {real_goal}。系统需要先确认
    {condition_a}，再结合 {condition_b} 做判断或执行，且不能忽略 {risk_or_buffer}。
  hidden_constraints_template:
    - 需要确认 {constraint_1}。
    - 需要估算或核验 {constraint_2}。
    - 判断或执行逻辑应包含 {constraint_3}。
    - 输出应包括 {constraint_4}，而不只是 {raw_tool_output}。
  suggested_plan_template:
    - 先查询 {signal_a}。
    - 再查询 {signal_b}。
    - 最后基于 {decision_rule} 给出 {final_output}。
  execution_rules_template:
    - 必须先获取 {required_fact}，再决定是否执行动作。
    - 若 {blocking_condition} 成立，则不能直接执行 {dangerous_action}。
    - 最终输出必须体现 {final_decision} 与 {key_reason}。

anti_patterns:
  - problem: 规则只写在 implicit_reason，world.state 和工具却无法支持验证。
    consequence: Agent 可能无法推理到正确答案，Evaluator 也会失去客观依据。
  - problem: user_prompt 已经直接泄露隐藏约束。
    consequence: 场景不再测试隐式推理，只是在测显式跟随。
  - problem: 一个工具调用就能直接拿到最终答案。
    consequence: 多跳推理被短路，场景区分度太低。
  - problem: evaluation_rubric 与 execution_rules 不一致。
    consequence: world 判断和 evaluator 打分会出现标准漂移。
  - problem: 混入过多无关干扰工具，但缺少关键证据工具。
    consequence: 难度变成噪声搜索，而不是隐式约束推理。

next_actions:
  - 用这份 rule set 给现有 `data/scenarios/*.yaml` 打主规则标签。
  - 统计当前每类规则已有多少场景，补齐覆盖空洞。
  - 将高频 rule family 收敛成可复用的 rubric 模板。
